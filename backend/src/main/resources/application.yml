spring:
  profiles:
    active: local
  application:
    name: today-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8083
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-random-string-at-least-32-bytes}
    access-token-ttl-minutes: 60
  cors:
    allowed-origins: "http://localhost:8081,http://localhost:19006,exp://*"

logging:
  level:
    com.today: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/today?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
