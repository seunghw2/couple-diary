spring:
  profiles:
    active: local
  application:
    name: today-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  # PaaS(Fly/Railway 등)는 PORT를 주입한다. 로컬은 미설정이라 8083 유지.
  port: ${PORT:8083}
  servlet:
    context-path: /
  forward-headers-strategy: framework   # 프록시 뒤에서 https/host 인식

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-random-string-at-least-32-bytes}
    access-token-ttl-minutes: 43200   # 30일 (둘만 쓰는 앱 — 로그인 자주 풀리지 않게)
  cors:
    allowed-origins: "http://localhost:8081,http://localhost:19006,http://localhost:5001,exp://*,https://*.trycloudflare.com,https://terrylovesapp.uk,https://*.terrylovesapp.uk,https://today.hammerslog.trade,https://today-web.hammerslog.trade"
  upload:
    dir: ${UPLOAD_DIR:${user.home}/couple-diary-uploads}
  # 관리자 배치 질문 생성 엔드포인트(/api/admin/**) 인증 토큰. 미설정(빈 값)이면 모든 요청 403.
  admin-token: ${ADMIN_TOKEN:}
  kakao:
    # 카카오 로컬 REST API 키(장소 키워드 검색 프록시용). 클라이언트에 노출하지 않고 서버에서만 사용.
    rest-key: ${KAKAO_REST_KEY:be9e8e34057ddefce22d6f52732c3c7a}
    # 카카오 로그인 토큰 교환용 Client Secret(콘솔 > 카카오 로그인 > 보안). "사용함"이면 필수, 없으면 미전송.
    client-secret: ${KAKAO_CLIENT_SECRET:}
  apple:
    # Sign in with Apple. client-id=번들ID(aud 검증). 아래 3개는 계정 삭제 시 토큰 revoke(5.1.1v)용
    # 서버-서버 키. Apple Developer > Keys에서 'Sign in with Apple' 키(.p8) 발급 후 채운다.
    # 미설정(빈 값)이면 revoke/토큰교환은 안전하게 no-op(로그인 자체는 정상 동작).
    client-id: ${APPLE_CLIENT_ID:uk.terrylovesapp.lovetoday}
    team-id: ${APPLE_TEAM_ID:}
    key-id: ${APPLE_KEY_ID:}
    private-key: ${APPLE_PRIVATE_KEY:}

logging:
  level:
    com.today: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/today?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

---
# 운영(PaaS) 프로파일. SPRING_PROFILES_ACTIVE=prod 로 활성화하고 DB_* 를 환경변수로 주입한다.
# DB_URL 예: jdbc:mysql://<host>:<port>/<db>?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=true&allowPublicKeyRetrieval=true
app:
  # 운영에서는 개발용 origin(exp://*, *.trycloudflare.com, localhost)을 제거하고 서비스 도메인만 허용.
  cors:
    allowed-origins: ${CORS_ORIGINS:https://terrylovesapp.uk,https://*.terrylovesapp.uk,https://today.hammerslog.trade,https://today-web.hammerslog.trade}
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
logging:
  level:
    com.today: INFO
    org.springframework.security: WARN
