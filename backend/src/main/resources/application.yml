spring:
  profiles:
    active: local
  application:
    name: today-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8083
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-random-string-at-least-32-bytes}
    access-token-ttl-minutes: 43200   # 30일 (둘만 쓰는 앱 — 로그인 자주 풀리지 않게)
  cors:
    allowed-origins: "http://localhost:8081,http://localhost:19006,http://localhost:5001,exp://*,https://*.trycloudflare.com,https://today.hammerslog.trade,https://today-web.hammerslog.trade"
  upload:
    dir: ${UPLOAD_DIR:${user.home}/couple-diary-uploads}

logging:
  level:
    com.today: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/today?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
