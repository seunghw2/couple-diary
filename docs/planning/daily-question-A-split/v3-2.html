<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분리형 V3 · ② 답장 봉인</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui,-apple-system,sans-serif; }
  body { background:#EFEAE6; display:flex; flex-direction:column; align-items:center; padding:32px 0; }
  .caption { text-align:center; margin-bottom:14px; }
  .caption .tag { color:#F47C63; font-weight:800; font-size:16px; }
  .caption .sub { color:#3B2D28; font-weight:800; font-size:16px; }
  .phone { width:390px; height:844px; background:#FBF3EE; border:44px solid #1c1c1e; border-radius:64px; overflow:hidden; position:relative; box-shadow:0 20px 60px rgba(0,0,0,.3); }
  .screen { width:100%; height:100%; overflow:hidden; display:flex; flex-direction:column; }
  .statusbar { height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 28px; font-size:15px; font-weight:600; color:#3B2D28; }
  .statusbar .dots { letter-spacing:2px; }
  .header { padding:8px 24px 4px; text-align:center; }
  .logo { color:#F47C63; font-weight:800; font-size:15px; letter-spacing:.3px; }
  .content { flex:1; padding:14px 22px 0; overflow:hidden; display:flex; flex-direction:column; }
  .step-row { display:flex; align-items:center; gap:8px; justify-content:center; margin-bottom:12px; }
  .step-pill { display:flex; align-items:center; gap:6px; border-radius:20px; padding:5px 12px; }
  .step-pill.done { background:#F1E4DD; }
  .step-pill.active { background:#FFF1EC; }
  .step-num { width:20px; height:20px; border-radius:50%; font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; }
  .step-num.done { background:#C7462E; color:#FFDCCF; }
  .step-num.active { background:#F47C63; color:#fff; }
  .step-lbl { font-size:12px; font-weight:700; }
  .step-lbl.done { color:#8B7268; }
  .step-lbl.active { color:#3B2D28; }
  .step-dash { color:#D9C6BC; font-size:13px; }

  .title { font-size:22px; font-weight:800; color:#3B2D28; text-align:center; margin:2px 0 3px; letter-spacing:-.3px; }
  .title .wax { color:#F47C63; }
  .subtitle { font-size:13px; color:#9B8B84; text-align:center; margin-bottom:14px; }

  /* sealed today-question badge */
  .sealed-q { background:#FFF1EC; border:1.5px solid #FFE7DF; border-radius:18px; padding:14px 16px 14px 58px; position:relative; margin-bottom:16px; }
  .sealed-q .badge { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:34px; height:34px; border-radius:50%; background:radial-gradient(circle at 38% 32%,#F98E76,#E5573C 70%,#C7462E); box-shadow:0 3px 8px rgba(197,70,46,.35), inset 0 -2px 4px rgba(0,0,0,.25); display:flex; align-items:center; justify-content:center; color:#FFDCCF; font-size:15px; }
  .sealed-q .badge::before { content:""; position:absolute; inset:4px; border-radius:50%; border:1px dashed rgba(255,220,207,.5); }
  .sealed-q .who { font-size:11px; font-weight:700; color:#C7462E; margin-bottom:3px; }
  .sealed-q .qtext { font-size:14px; font-weight:700; color:#3B2D28; line-height:1.45; font-family:Georgia,serif; }

  /* reply letter paper */
  .paper { flex:1; background:#fff; border-radius:22px; box-shadow:0 8px 24px rgba(180,120,100,.12); padding:18px 20px 16px; position:relative; overflow:hidden; }
  .paper .plabel { font-size:11px; font-weight:700; color:#F47C63; letter-spacing:1px; margin-bottom:12px; }
  .lines { position:relative; }
  .lines .ln { height:30px; border-bottom:1px solid #F3E5DE; }
  .writing { position:absolute; top:0; left:0; right:0; font-family:Georgia,serif; font-size:15px; color:#3B2D28; line-height:30px; }
  .writing .cursor { display:inline-block; width:2px; height:18px; background:#F47C63; vertical-align:-3px; margin-left:1px; animation:blink 1s steps(1) infinite; }
  @keyframes blink { 50%{ opacity:0; } }

  .footer { padding:14px 22px 20px; }
  .partner { display:flex; align-items:center; justify-content:center; gap:7px; font-size:12px; color:#9B8B84; margin-bottom:12px; }
  .partner .dot { width:7px; height:7px; border-radius:50%; background:#D9C6BC; }
  .seal-btn { width:100%; height:56px; border:none; border-radius:20px; background:#F47C63; color:#fff; font-size:16px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:9px; box-shadow:0 10px 22px rgba(244,124,99,.34); letter-spacing:.2px; position:relative; }
  .seal-btn .waxbig { width:30px; height:30px; border-radius:50%; background:radial-gradient(circle at 38% 32%,#FFCBBB,#E5573C 75%,#C7462E); display:flex; align-items:center; justify-content:center; font-size:15px; color:#FFDCCF; box-shadow:inset 0 -2px 4px rgba(0,0,0,.3), 0 2px 6px rgba(197,70,46,.4); }
  .homebar { position:absolute; bottom:9px; left:50%; transform:translateX(-50%); width:134px; height:5px; border-radius:3px; background:#3B2D28; opacity:.28; }
</style>
</head>
<body>
  <div class="caption">
    <div class="tag">분리형 V3</div>
    <div class="sub">두 번의 봉인 &nbsp; ② 답장 봉인</div>
  </div>

  <div class="phone">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="dots">●●● 📶 100%</span>
      </div>

      <div class="header">
        <div class="logo">love today ♥</div>
      </div>

      <div class="content">
        <div class="step-row">
          <div class="step-pill done">
            <span class="step-num done">✓</span>
            <span class="step-lbl done">질문 봉인 완료</span>
          </div>
          <span class="step-dash">···</span>
          <div class="step-pill active">
            <span class="step-num active">2</span>
            <span class="step-lbl active">답장 봉인</span>
          </div>
        </div>

        <div class="title">답장을 <span class="wax">봉인해요</span></div>
        <div class="subtitle">오늘의 질문에 마음을 담아 · 2/2</div>

        <div class="sealed-q">
          <div class="badge">♥</div>
          <div class="who">지훈이 골랐어요 · 오늘의 질문</div>
          <div class="qtext">"우리가 처음 만난 날, 너의 첫인상은 어땠어?"</div>
        </div>

        <div class="paper">
          <div class="plabel">나의 답장 편지</div>
          <div class="lines">
            <div class="writing">
              사실 그날 엄청 긴장했었어. 근데 네가 먼저<br>
              웃어줘서 마음이 확 풀렸던 게 아직도 생생<br>
              하게 기억나. 첫인상은… 따뜻한 사람<span class="cursor"></span>
            </div>
            <div class="ln"></div>
            <div class="ln"></div>
            <div class="ln"></div>
            <div class="ln"></div>
            <div class="ln"></div>
            <div class="ln"></div>
          </div>
        </div>
      </div>

      <div class="footer">
        <div class="partner"><span class="dot"></span> 지훈이는 아직 답장 전이에요 · 둘 다 봉인하면 열려요</div>
        <button class="seal-btn">
          <span class="waxbig">♥</span>
          답장 봉인하기
        </button>
      </div>

      <div class="homebar"></div>
    </div>
  </div>
</body>
</html>
