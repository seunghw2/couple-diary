<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스토리보드 ② · 상대가 골랐어요</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #EFEAE6;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 0 60px;
    min-height: 100vh;
  }
  .caption {
    text-align: center;
    margin-bottom: 18px;
  }
  .caption .num {
    color: #F47C63;
    font-weight: 800;
    font-size: 16px;
  }
  .caption .title {
    color: #3B2D28;
    font-weight: 800;
    font-size: 16px;
  }
  .caption .sub {
    color: #9B8B84;
    font-size: 14px;
    margin-top: 4px;
  }
  .phone {
    width: 390px;
    height: 844px;
    background: #1c1c1e;
    border-radius: 56px;
    padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    position: relative;
  }
  .screen {
    width: 100%;
    height: 100%;
    background: #FBF3EE;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .statusbar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    font-size: 15px;
    font-weight: 600;
    color: #3B2D28;
    flex-shrink: 0;
  }
  .statusbar .right { letter-spacing: 2px; }
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 8px 24px 0;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 26px;
  }
  .logo {
    font-weight: 800;
    font-size: 20px;
    color: #F47C63;
    font-family: Georgia, serif;
  }
  .streak {
    background: #FFE7DF;
    color: #F47C63;
    font-weight: 700;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 20px;
  }
  .partner-note {
    background: #FFF1EC;
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
  }
  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #F47C63;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    flex-shrink: 0;
  }
  .partner-note .txt {
    color: #3B2D28;
    font-size: 15px;
    font-weight: 600;
  }
  .qcard {
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 8px 24px rgba(180,120,100,.12);
    padding: 30px 26px 28px;
    margin-bottom: 22px;
    position: relative;
    text-align: center;
  }
  .qcard .seal {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #F47C63;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin: 0 auto 18px;
    box-shadow: 0 4px 10px rgba(244,124,99,.4);
  }
  .qcard .label {
    font-size: 12px;
    color: #9B8B84;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .qcard .question {
    font-family: Georgia, serif;
    font-size: 23px;
    line-height: 1.5;
    color: #3B2D28;
    font-weight: 400;
  }
  .pills {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .pill {
    flex: 1;
    background: #fff;
    border-radius: 16px;
    padding: 14px;
    text-align: center;
    box-shadow: 0 4px 14px rgba(180,120,100,.08);
  }
  .pill .who {
    font-size: 13px;
    color: #9B8B84;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .pill .state {
    font-size: 14px;
    font-weight: 800;
  }
  .pill.done .state { color: #F47C63; }
  .pill.wait .state { color: #C0AFA8; }
  .cta {
    background: #F47C63;
    color: #fff;
    text-align: center;
    font-weight: 800;
    font-size: 17px;
    padding: 18px;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(244,124,99,.32);
    margin-bottom: 14px;
  }
  .deadline {
    text-align: center;
    font-size: 13px;
    color: #9B8B84;
    margin-bottom: 20px;
  }
  .tabbar {
    height: 78px;
    background: #fff;
    border-top: 1px solid #F1E6E0;
    display: flex;
    align-items: flex-start;
    padding-top: 12px;
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    text-align: center;
    color: #C4B5AE;
    font-size: 11px;
    position: relative;
  }
  .tab .ic { font-size: 22px; display: block; margin-bottom: 3px; }
  .tab.active { color: #F47C63; font-weight: 700; }
  .badge {
    position: absolute;
    top: -2px;
    right: 50%;
    margin-right: -18px;
    width: 8px;
    height: 8px;
    background: #F47C63;
    border-radius: 50%;
    border: 1.5px solid #fff;
  }
</style>
</head>
<body>
  <div class="caption">
    <div><span class="num">스토리보드 ②</span> <span class="title">· 상대가 골랐어요(내가 나중에 봄)</span></div>
    <div class="sub">선택은 끝났고 답장만 남은 화면</div>
  </div>
  <div class="phone">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="right">●●● ▮</span>
      </div>
      <div class="content">
        <div class="topbar">
          <div class="logo">love today ♥</div>
          <div class="streak">♥ 24일</div>
        </div>

        <div class="partner-note">
          <div class="avatar">지</div>
          <div class="txt">지훈이 오늘 질문을 골랐어요 ♥</div>
        </div>

        <div class="qcard">
          <div class="seal">♥</div>
          <div class="label">오늘의 질문</div>
          <div class="question">요즘 나를 가장<br>웃게 한 순간은?</div>
        </div>

        <div class="pills">
          <div class="pill done">
            <div class="who">지훈</div>
            <div class="state">답장함 ✓</div>
          </div>
          <div class="pill wait">
            <div class="who">나</div>
            <div class="state">아직 답장 전</div>
          </div>
        </div>

        <div class="cta">답장 쓰러 가기</div>
        <div class="deadline">오늘 자정까지 답장하면 편지가 열려요</div>
      </div>
      <div class="tabbar">
        <div class="tab"><span class="ic">📅</span>달력</div>
        <div class="tab"><span class="ic">🗺</span>지도</div>
        <div class="tab active"><span class="ic">✉</span>질문<span class="badge"></span></div>
        <div class="tab"><span class="ic">⚙</span>설정</div>
      </div>
    </div>
  </div>
</body>
</html>
