<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스토리보드 ④ · 봉인 완료·상대 대기</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#EFEAE6;
    font-family:system-ui, -apple-system, sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:32px 0;
  }
  .caption { text-align:center; margin-bottom:14px; }
  .caption .num { color:#F47C63; font-weight:800; font-size:16px; }
  .caption .txt { color:#3B2D28; font-weight:800; font-size:16px; }
  .phone {
    width:390px; height:844px;
    background:#1c1c1e; border-radius:56px;
    padding:14px; box-shadow:0 20px 50px rgba(0,0,0,.28);
  }
  .screen {
    width:100%; height:100%;
    background:#FBF3EE; border-radius:44px;
    overflow:hidden; position:relative;
    display:flex; flex-direction:column;
    font-family:Georgia, 'Times New Roman', serif;
  }
  .statusbar {
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; font-family:system-ui; font-weight:600; font-size:15px; color:#3B2D28;
    flex-shrink:0;
  }
  .statusbar .icons { display:flex; gap:6px; align-items:center; }
  .dot-sig { width:16px; height:11px; background:#3B2D28; border-radius:2px; }
  .battery { width:22px; height:11px; border:1.5px solid #3B2D28; border-radius:3px; position:relative; }
  .battery::after { content:''; position:absolute; right:-3px; top:3px; width:2px; height:5px; background:#3B2D28; border-radius:1px; }
  .battery i { position:absolute; left:1.5px; top:1.5px; bottom:1.5px; width:13px; background:#3B2D28; border-radius:1px; }
  /* header */
  .header {
    display:flex; align-items:center; padding:6px 20px 12px; flex-shrink:0;
  }
  .logo { font-family:Georgia,serif; font-weight:800; font-size:18px; color:#3B2D28; }
  .logo b { color:#F47C63; }
  .streak {
    margin-left:auto; display:inline-flex; align-items:center; gap:4px;
    font-family:system-ui; font-size:12px; font-weight:700; color:#F47C63;
    background:#FFE7DF; padding:5px 10px; border-radius:20px;
  }
  .content { flex:1; overflow-y:auto; padding:4px 20px 20px; }
  /* hero status */
  .hero {
    text-align:center; margin:8px 0 20px;
  }
  .hero .big {
    font-size:22px; font-weight:800; color:#3B2D28; margin-bottom:8px;
  }
  .hero .sub {
    font-family:system-ui; font-size:12.5px; color:#9B8B84; line-height:1.5;
  }
  /* question summary */
  .qsum {
    background:#FFF1EC; border-radius:16px; padding:13px 16px; margin-bottom:18px;
  }
  .qsum .lead { font-family:system-ui; font-size:11px; color:#9B8B84; font-weight:600; margin-bottom:5px; }
  .qsum .q { font-size:15px; color:#3B2D28; font-weight:700; line-height:1.4; }
  /* letter cards */
  .cards { display:flex; flex-direction:column; gap:14px; margin-bottom:20px; }
  .card {
    border-radius:22px; padding:20px; position:relative; overflow:hidden;
    box-shadow:0 8px 24px rgba(180,120,100,.12);
  }
  .card .label {
    font-family:system-ui; font-size:11px; font-weight:700; margin-bottom:12px;
    display:flex; align-items:center; gap:6px;
  }
  /* my sealed card */
  .mine { background:#FFFFFF; }
  .mine .label { color:#F47C63; }
  .sealed-body { position:relative; }
  .sealed-body .peek {
    font-size:14px; color:#C9B8B0; line-height:1.7;
    filter:blur(1.2px); user-select:none;
  }
  .wax-badge {
    position:absolute; right:2px; bottom:-2px;
    width:44px; height:44px; background:#D8543C; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:#FFE7DF; font-size:20px;
    box-shadow:0 4px 10px rgba(216,84,60,.4), inset 0 -3px 5px rgba(0,0,0,.2);
  }
  .sealed-tag {
    display:inline-block; margin-top:14px; font-family:system-ui;
    font-size:11px; font-weight:700; color:#D8543C;
    background:#FFE7DF; padding:4px 10px; border-radius:14px;
  }
  /* partner locked card */
  .partner {
    background:#F6EEE9; border:1px dashed #E4D3CA;
  }
  .partner .label { color:#9B8B84; }
  .lock-center {
    text-align:center; padding:14px 0 6px;
  }
  .lock-icon {
    font-size:26px; color:#C9B8B0; margin-bottom:8px;
  }
  .lock-text {
    font-family:system-ui; font-size:13px; color:#9B8B84; font-weight:600;
  }
  .partner .blur-lines { filter:blur(4px); opacity:.5; margin-bottom:10px; }
  .partner .blur-lines div { height:12px; background:#E4D3CA; border-radius:6px; margin-bottom:9px; }
  .partner .blur-lines div:nth-child(2){ width:80%; }
  .partner .blur-lines div:nth-child(3){ width:60%; }
  /* status pills */
  .status-row { display:flex; gap:8px; margin-bottom:16px; font-family:system-ui; }
  .pill {
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; font-weight:600; padding:7px 12px; border-radius:20px;
  }
  .pill.done { background:#FFE7DF; color:#F47C63; }
  .pill.wait { background:#FFF1EC; border:1px solid #FFE7DF; color:#9B8B84; }
  .pill .who { font-weight:800; }
  .pill.done .who { color:#D8543C; }
  .pill.wait .who { color:#3B2D28; }
  .deadline {
    font-family:system-ui; text-align:center; font-size:12px; color:#9B8B84;
    line-height:1.5;
  }
  .deadline b { color:#F47C63; font-weight:700; }
  /* tab bar */
  .tabbar {
    flex-shrink:0; height:78px; background:#FFFFFF;
    border-top:1px solid #F3E6DF;
    display:flex; align-items:flex-start; justify-content:space-around;
    padding-top:11px; font-family:system-ui;
  }
  .tab {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    font-size:10px; color:#C9B8B0; font-weight:600; position:relative; width:60px;
  }
  .tab .ico { font-size:21px; line-height:1; }
  .tab.active { color:#F47C63; }
  .tab .badge-dot {
    position:absolute; top:-3px; right:14px;
    width:8px; height:8px; background:#F47C63; border-radius:50%;
    border:1.5px solid #fff;
  }
</style>
</head>
<body>
  <div class="caption">
    <span class="num">스토리보드 ④</span> <span class="txt">· 봉인 완료·상대 대기</span>
  </div>
  <div class="phone">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="icons">
          <span class="dot-sig"></span>
          <span style="font-family:system-ui;font-size:12px;">5G</span>
          <span class="battery"><i></i></span>
        </span>
      </div>
      <div class="header">
        <span class="logo">love today <b>♥</b></span>
        <span class="streak">♥ 24일</span>
      </div>
      <div class="content">
        <div class="hero">
          <div class="big">내 답장을 봉인했어요</div>
          <div class="sub">이제 지훈이 답장하면 서로의 편지가 열려요</div>
        </div>

        <div class="qsum">
          <div class="lead">오늘의 질문</div>
          <div class="q">요즘 나를 가장 웃게 한 순간은 언제였어?</div>
        </div>

        <div class="cards">
          <div class="card mine">
            <div class="label">✉ 나의 편지 · 봉인됨</div>
            <div class="sealed-body">
              <div class="peek">지난 주말에 같이 본 영화가 너무 웃겨서, 네가 팝콘 흘리면서 웃던 그 모습이…</div>
              <div class="wax-badge">♥</div>
            </div>
            <span class="sealed-tag">봉인 완료</span>
          </div>

          <div class="card partner">
            <div class="label">✉ 지훈의 편지</div>
            <div class="blur-lines">
              <div></div><div></div><div></div>
            </div>
            <div class="lock-center">
              <div class="lock-icon">🔒</div>
              <div class="lock-text">지훈이 답하면 열려요</div>
            </div>
          </div>
        </div>

        <div class="status-row">
          <span class="pill done">나 · 봉인함 <span class="who">✓</span></span>
          <span class="pill wait"><span class="who">지훈</span> · 아직</span>
        </div>

        <div class="deadline">
          오늘 <b>자정</b>까지 지훈이 답하면<br>서로의 편지가 함께 열려요
        </div>
      </div>

      <div class="tabbar">
        <div class="tab"><span class="ico">▦</span>달력</div>
        <div class="tab"><span class="ico">◎</span>지도</div>
        <div class="tab active"><span class="badge-dot"></span><span class="ico">✉</span>질문</div>
        <div class="tab"><span class="ico">⚙</span>설정</div>
      </div>
    </div>
  </div>
</body>
</html>
