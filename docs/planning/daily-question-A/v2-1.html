<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2 · 오늘의 두 질문 ①</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body {
    background:#EFEAE6;
    font-family: system-ui, -apple-system, "Apple SD Gothic Neo", sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:32px 0;
  }
  .caption { text-align:center; margin-bottom:18px; }
  .caption .top { color:#F47C63; font-weight:800; font-size:17px; letter-spacing:.2px; }
  .caption .top b { color:#3B2D28; }
  .caption .sub { color:#9B8B84; font-size:14px; margin-top:5px; }

  .phone {
    width:390px; height:844px; background:#1c1c1e;
    border-radius:56px; padding:14px; position:relative;
    box-shadow:0 24px 60px rgba(60,40,35,.35);
  }
  .screen {
    width:100%; height:100%; background:#FBF3EE;
    border-radius:44px; overflow:hidden; position:relative;
    display:flex; flex-direction:column;
  }
  /* status bar */
  .statusbar {
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 30px; font-size:15px; font-weight:700; color:#3B2D28; flex-shrink:0;
  }
  .statusbar .dots { display:flex; gap:5px; align-items:center; }
  .statusbar .dot { font-size:12px; letter-spacing:1px; }

  /* header */
  .appbar { padding:6px 24px 12px; text-align:center; flex-shrink:0; }
  .logo { font-size:15px; font-weight:800; color:#F47C63; letter-spacing:.3px; }
  .hero { padding:10px 26px 14px; text-align:center; flex-shrink:0; }
  .hero h1 { font-size:20px; font-weight:800; color:#3B2D28; line-height:1.35; letter-spacing:-.3px; }
  .hero p { font-size:13px; color:#9B8B84; margin-top:7px; }

  .scroll { flex:1; overflow-y:auto; padding:4px 20px 20px; }

  /* letter card */
  .card {
    background:#ffffff; border-radius:22px;
    box-shadow:0 8px 24px rgba(180,120,100,.12);
    padding:20px 20px 18px; margin-bottom:16px; position:relative;
  }
  .card .qtag { font-size:11.5px; font-weight:700; color:#F47C63; letter-spacing:.5px; margin-bottom:9px; display:flex; align-items:center; gap:6px; }
  .card .qtag .num {
    width:20px; height:20px; border-radius:50%; background:#FFE7DF;
    display:inline-flex; align-items:center; justify-content:center; font-size:11px;
  }
  .card .qtext {
    font-family: Georgia, "Times New Roman", serif;
    font-size:18px; font-weight:700; color:#3B2D28; line-height:1.5; letter-spacing:-.2px;
  }

  /* chosen card — reply area open */
  .card.chosen { border:1.5px solid #FFD9CC; }
  .chosen-mark {
    position:absolute; top:-11px; left:20px; background:#F47C63; color:#fff;
    font-size:11px; font-weight:800; padding:4px 12px; border-radius:20px;
    box-shadow:0 4px 10px rgba(244,124,99,.35);
  }
  .reply {
    margin-top:16px; border-radius:14px; padding:16px 16px 14px;
    background:
      repeating-linear-gradient(#FFF1EC, #FFF1EC 27px, #FFD9CC 28px);
    background-color:#FFF1EC; min-height:120px; position:relative;
  }
  .reply .writing {
    font-family: Georgia, serif; font-size:15px; color:#3B2D28; line-height:28px;
  }
  .cursor {
    display:inline-block; width:2px; height:19px; background:#F47C63;
    vertical-align:-3px; margin-left:1px; animation:blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity:0; } }

  .btn-answer {
    margin-top:14px; width:100%; border:none; cursor:pointer;
    background:#FBF3EE; color:#3B2D28; font-weight:800; font-size:14px;
    padding:13px; border-radius:14px; letter-spacing:-.2px;
    border:1.5px solid #FFE7DF;
  }
  .card.unchosen { opacity:.96; }
  .card.unchosen .fade-note {
    margin-top:13px; font-size:12px; color:#C9A99C; text-align:center;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }

  /* streak */
  .streak {
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:4px 0 14px; font-size:12px; color:#9B8B84;
  }
  .streak .flame { color:#F47C63; }
  .streak .track { display:flex; gap:5px; }
  .streak .pip { width:7px; height:7px; border-radius:50%; background:#FFE7DF; }
  .streak .pip.on { background:#F47C63; }

  /* seal button */
  .sealbar { padding:6px 20px 8px; flex-shrink:0; }
  .seal-btn {
    width:100%; border:none; cursor:pointer;
    background:#F47C63; color:#fff; font-weight:800; font-size:16px;
    padding:16px; border-radius:18px; letter-spacing:.2px;
    box-shadow:0 10px 22px rgba(244,124,99,.32);
    display:flex; align-items:center; justify-content:center; gap:9px;
  }
  .wax {
    width:22px; height:22px; border-radius:50%; background:rgba(255,255,255,.22);
    display:inline-flex; align-items:center; justify-content:center; font-size:12px;
  }
  .homeind { width:130px; height:5px; background:#3B2D28; opacity:.22; border-radius:3px; margin:8px auto 4px; }
</style>
</head>
<body>
  <div class="caption">
    <div class="top">V2 · 오늘의 두 질문 &nbsp;&nbsp;<b>① 펼쳐 보고 고르기</b></div>
    <div class="sub">두 질문을 다 펼쳐 읽고, 마음에 드는 편지지에 바로 답장</div>
  </div>

  <div class="phone">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="dots"><span class="dot">●●●</span> <span>&#9207;</span> <span>&#128267;</span></span>
      </div>

      <div class="appbar">
        <div class="logo">love today &#9829;</div>
      </div>

      <div class="hero">
        <h1>오늘 두 통의 편지가 왔어요</h1>
        <p>하나만 골라 답장해요 · 안 고른 편지는 사라져요</p>
      </div>

      <div class="scroll">

        <!-- chosen card with reply open -->
        <div class="card chosen">
          <div class="chosen-mark">이 편지를 골랐어요</div>
          <div class="qtag"><span class="num">1</span> 오늘의 편지</div>
          <div class="qtext">우리가 처음 만난 날,<br>솔직한 첫인상은 어땠어?</div>
          <div class="reply">
            <div class="writing">생각보다 말수가 적어서 조금<br>긴장했는데, 웃을 때 눈이<span class="cursor"></span></div>
          </div>
        </div>

        <!-- unchosen card -->
        <div class="card unchosen">
          <div class="qtag"><span class="num">2</span> 오늘의 편지</div>
          <div class="qtext">요즘 나한테 가장<br>고마웠던 순간은 언제야?</div>
          <button class="btn-answer">이 편지에 답할래</button>
          <div class="fade-note">&#9888;&#65039;&nbsp;고르면 오늘은 사라져요</div>
        </div>

        <div class="streak">
          <span class="flame">&#9829;</span>
          <span>함께 쓴 편지</span>
          <span class="track">
            <span class="pip on"></span><span class="pip on"></span><span class="pip on"></span>
            <span class="pip on"></span><span class="pip on"></span><span class="pip on"></span><span class="pip"></span>
          </span>
          <span>6일째</span>
        </div>
      </div>

      <div class="sealbar">
        <button class="seal-btn"><span class="wax">&#9829;</span> 답장 봉인하기</button>
        <div class="homeind"></div>
      </div>
    </div>
  </div>
</body>
</html>
