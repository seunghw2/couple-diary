<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A안 · 감성 편지함 ① 질문 도착·답장</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #EFEAE6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 0;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .caption {
    font-size: 17px;
    color: #3B2D28;
    margin-bottom: 14px;
    letter-spacing: -0.2px;
  }
  .caption .an { color: #F47C63; font-weight: 800; }
  .caption .rest { font-weight: 600; }

  /* Phone */
  .phone {
    width: 390px;
    height: 844px;
    background: #1c1c1e;
    border-radius: 56px;
    padding: 14px;
    box-shadow: 0 30px 60px rgba(60,40,35,.35);
  }
  .screen {
    width: 100%;
    height: 100%;
    background: #FBF3EE;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  /* status bar */
  .statusbar {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    font-size: 15px;
    font-weight: 700;
    color: #3B2D28;
    flex-shrink: 0;
  }
  .statusbar .dots { display: flex; gap: 5px; align-items: center; font-size: 12px; letter-spacing:1px;}

  /* content */
  .content {
    flex: 1;
    padding: 6px 22px 26px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .logo {
    font-size: 17px;
    font-weight: 800;
    color: #3B2D28;
    letter-spacing: -0.3px;
  }
  .logo .heart { color: #F47C63; }
  .streak {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #FFF1EC;
    padding: 6px 11px;
    border-radius: 14px;
    font-size: 12px;
    color: #9B8B84;
    font-weight: 600;
  }
  .streak b { color: #F47C63; font-weight: 800; }

  /* arrival label */
  .arrival {
    text-align: center;
    margin-bottom: 14px;
  }
  .arrival .date {
    font-size: 12.5px;
    color: #9B8B84;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .arrival .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 13px;
    color: #F47C63;
    font-weight: 700;
  }
  .arrival .tag .env { font-size: 15px; }

  /* letter card - the question */
  .letter {
    background: #FFFFFF;
    border-radius: 22px;
    padding: 26px 24px 24px;
    box-shadow: 0 8px 24px rgba(180,120,100,.12);
    position: relative;
    margin-bottom: 16px;
  }
  /* wax seal accent */
  .letter::before {
    content: "♥";
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 34px;
    height: 34px;
    background: #F47C63;
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    box-shadow: 0 4px 10px rgba(244,124,99,.4);
  }
  .letter .q-label {
    font-size: 11.5px;
    color: #C9A99C;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-align: center;
    margin-bottom: 12px;
  }
  .letter .q-text {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 22px;
    line-height: 1.5;
    color: #3B2D28;
    text-align: center;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .letter .q-from {
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: #9B8B84;
    font-style: italic;
  }

  /* my answer - writing on letter paper */
  .paper {
    background: #FFF1EC;
    border-radius: 22px;
    padding: 20px 22px 18px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.6);
    margin-bottom: 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .paper .p-head {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 12px;
  }
  .paper .p-head .avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: #F47C63;
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size: 12px; font-weight:800;
  }
  .paper .p-head .p-title {
    font-size: 13.5px; color:#3B2D28; font-weight: 700;
  }
  .lines {
    flex: 1;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 29px,
      rgba(155,139,132,.22) 29px,
      rgba(155,139,132,.22) 30px
    );
    padding-top: 3px;
  }
  .lines .written {
    font-family: Georgia, serif;
    font-size: 15.5px;
    line-height: 30px;
    color: #3B2D28;
  }
  .lines .written .cursor {
    display:inline-block;
    width: 2px; height: 18px;
    background: #F47C63;
    vertical-align: -3px;
    margin-left: 2px;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* locked partner */
  .locked {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #FBF3EE;
    border: 1px dashed #E6D3CB;
    border-radius: 16px;
    padding: 13px 16px;
    margin-bottom: 16px;
  }
  .locked .lock-ic { font-size: 16px; opacity:.7; }
  .locked .lk-text { font-size: 13px; color:#9B8B84; font-weight: 600; }

  /* seal button */
  .seal-btn {
    background: #F47C63;
    color: #fff;
    border-radius: 18px;
    padding: 17px;
    text-align: center;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.2px;
    box-shadow: 0 10px 22px rgba(244,124,99,.35);
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
</style>
</head>
<body>
  <div class="caption"><span class="an">A안 · 감성 편지함</span><span class="rest">&nbsp;&nbsp;&nbsp;① 질문 도착·답장</span></div>

  <div class="phone">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="dots">●●● &#9679; ▮</span>
      </div>

      <div class="content">
        <div class="topbar">
          <div class="logo">love today <span class="heart">♥</span></div>
          <div class="streak">🔥 <b>24</b>일째</div>
        </div>

        <div class="arrival">
          <div class="date">2026 · 7 · 6  월요일</div>
          <div class="tag"><span class="env">✉︎</span> 오늘의 편지가 도착했어요</div>
        </div>

        <div class="letter">
          <div class="q-label">TODAY'S QUESTION</div>
          <div class="q-text">우리가 처음 만난 날,<br>솔직한 첫인상은?</div>
          <div class="q-from">— 오늘 서로에게 묻는 한 가지</div>
        </div>

        <div class="paper">
          <div class="p-head">
            <div class="avatar">나</div>
            <div class="p-title">나의 답장</div>
          </div>
          <div class="lines">
            <div class="written">생각보다 말수가 적어서 조금 무뚝뚝한 사람인 줄<span class="cursor"></span></div>
          </div>
        </div>

        <div class="locked">
          <span class="lock-ic">🔒</span>
          <span class="lk-text">상대가 답하면 이 편지가 열려요</span>
        </div>

        <div class="seal-btn">✎ 답장 봉인하기</div>
      </div>
    </div>
  </div>
</body>
</html>
