<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>13 · 우리 플레이리스트</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, -apple-system, sans-serif; }
  body {
    background:#EFEAE6;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 0;
  }
  .caption {
    text-align:center;
    margin-bottom:14px;
    font-size:18px;
  }
  .caption .num { color:#F47C63; font-weight:800; }
  .caption .name { color:#3B2D28; font-weight:800; }

  .phone {
    width:390px;
    height:844px;
    background:#1c1c1e;
    border-radius:56px;
    padding:14px;
    box-shadow:0 30px 70px rgba(80,50,40,.35);
    position:relative;
  }
  .screen {
    width:100%;
    height:100%;
    background:#FBF3EE;
    border-radius:44px;
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  /* status bar */
  .statusbar {
    height:44px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 26px;
    font-size:14px;
    font-weight:600;
    color:#3B2D28;
    flex-shrink:0;
  }
  .statusbar .icons { display:flex; gap:6px; align-items:center; }
  .statusbar .icons svg { display:block; }

  /* header */
  .app-header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:6px 22px 10px;
    flex-shrink:0;
  }
  .logo { font-size:17px; font-weight:800; color:#F47C63; letter-spacing:-.3px; }
  .logo span { color:#3B2D28; }
  .header-add {
    width:34px; height:34px; border-radius:50%;
    background:#FFE7DF; display:flex; align-items:center; justify-content:center;
    color:#F47C63;
  }

  .content { flex:1; overflow-y:auto; padding-bottom:96px; }
  .content::-webkit-scrollbar { display:none; }

  /* cover hero */
  .cover-wrap { padding:4px 22px 0; }
  .cover-card {
    border-radius:24px;
    padding:20px;
    background:linear-gradient(135deg,#F47C63 0%,#F79C7E 45%,#FFB59A 100%);
    box-shadow:0 12px 30px rgba(244,124,99,.35);
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    gap:16px;
  }
  .cover-card::after {
    content:"";
    position:absolute; right:-30px; top:-30px;
    width:120px; height:120px; border-radius:50%;
    background:rgba(255,255,255,.12);
  }
  .cover-art {
    width:88px; height:88px; border-radius:18px; flex-shrink:0;
    background:
      linear-gradient(135deg,#FFD9CB 0%,#F47C63 55%,#C85A45 100%);
    box-shadow:0 6px 16px rgba(120,50,40,.3);
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  .cover-art .heart { font-size:30px; filter:drop-shadow(0 2px 3px rgba(120,50,40,.4)); }
  .cover-meta { color:#fff; z-index:1; }
  .cover-meta .kicker { font-size:11px; font-weight:700; opacity:.85; letter-spacing:.5px; }
  .cover-meta h1 { font-size:24px; font-weight:800; margin:2px 0 6px; letter-spacing:-.5px; }
  .cover-meta .stats { font-size:12.5px; font-weight:600; opacity:.92; }
  .cover-meta .dot { opacity:.6; margin:0 5px; }

  /* mini player */
  .miniplayer {
    margin:16px 22px 4px;
    background:#fff;
    border-radius:22px;
    padding:12px 14px;
    box-shadow:0 8px 24px rgba(180,120,100,.12);
    display:flex;
    align-items:center;
    gap:12px;
  }
  .mini-art {
    width:46px; height:46px; border-radius:12px; flex-shrink:0;
    background:linear-gradient(140deg,#B7D0E8,#7FA6CE);
    position:relative;
  }
  .mini-info { flex:1; min-width:0; }
  .mini-now { font-size:9.5px; font-weight:800; color:#F47C63; letter-spacing:.5px; }
  .mini-title { font-size:13.5px; font-weight:800; color:#3B2D28; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mini-artist { font-size:11px; color:#9B8B84; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mini-bar { height:4px; background:#FFE7DF; border-radius:4px; margin-top:7px; position:relative; }
  .mini-bar .fill { position:absolute; left:0; top:0; height:100%; width:42%; background:#F47C63; border-radius:4px; }
  .mini-bar .knob { position:absolute; left:42%; top:50%; transform:translate(-50%,-50%); width:9px; height:9px; border-radius:50%; background:#F47C63; box-shadow:0 1px 3px rgba(244,124,99,.5); }
  .mini-play {
    width:42px; height:42px; border-radius:50%; flex-shrink:0;
    background:#F47C63; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 14px rgba(244,124,99,.4);
  }

  /* list */
  .list-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 24px 8px;
  }
  .list-head .title { font-size:15px; font-weight:800; color:#3B2D28; }
  .list-head .sort { font-size:12px; font-weight:700; color:#9B8B84; display:flex; align-items:center; gap:3px; }

  .track {
    display:flex; align-items:center; gap:12px;
    margin:0 16px 8px;
    padding:10px 12px;
    background:#fff;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(180,120,100,.08);
  }
  .track.playing { background:#FFF1EC; box-shadow:0 6px 18px rgba(244,124,99,.14); }
  .t-art { width:52px; height:52px; border-radius:13px; flex-shrink:0; position:relative; }
  .t-art.a { background:linear-gradient(140deg,#B7D0E8,#7FA6CE); }
  .t-art.b { background:linear-gradient(140deg,#F9C8B4,#E8845F); }
  .t-art.c { background:linear-gradient(140deg,#CDBEE8,#9B7FCE); }
  .t-art.d { background:linear-gradient(140deg,#F5D98C,#E0A94A); }
  .t-art.e { background:linear-gradient(140deg,#A8DBC5,#5FB08A); }
  .t-body { flex:1; min-width:0; }
  .t-title { font-size:14px; font-weight:800; color:#3B2D28; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .t-artist { font-size:11.5px; color:#9B8B84; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .t-tags { display:flex; align-items:center; gap:6px; margin-top:7px; flex-wrap:wrap; }
  .diary-tag {
    display:inline-flex; align-items:center; gap:3px;
    font-size:10px; font-weight:700; color:#F47C63;
    background:#FFE7DF; padding:3px 8px; border-radius:20px;
  }
  .t-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0; }
  .avatar {
    width:24px; height:24px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; color:#fff;
    border:2px solid #fff;
  }
  .av-me { background:#F47C63; }
  .av-you { background:#7FA6CE; }
  .t-dur { font-size:11px; font-weight:600; color:#9B8B84; }
  .eq { display:flex; align-items:flex-end; gap:2px; height:14px; }
  .eq span { width:3px; background:#F47C63; border-radius:2px; animation:bounce 1s infinite ease-in-out; }
  .eq span:nth-child(1){ height:6px; animation-delay:0s; }
  .eq span:nth-child(2){ height:13px; animation-delay:.2s; }
  .eq span:nth-child(3){ height:9px; animation-delay:.4s; }
  @keyframes bounce { 0%,100%{ transform:scaleY(.5);} 50%{ transform:scaleY(1);} }

  /* tab bar */
  .tabbar {
    position:absolute; left:0; right:0; bottom:0;
    height:84px;
    background:rgba(255,255,255,.94);
    backdrop-filter:blur(12px);
    border-top:1px solid #F0E4DC;
    display:flex; justify-content:space-around; align-items:flex-start;
    padding-top:12px;
    border-radius:0 0 44px 44px;
  }
  .tab { display:flex; flex-direction:column; align-items:center; gap:4px; color:#C9B8AF; }
  .tab.active { color:#F47C63; }
  .tab .lbl { font-size:10.5px; font-weight:700; }
</style>
</head>
