<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투데이 · 홈 (웜 샌드)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3ECE0;            /* warm beige */
    --bg2:#F6F0E6;           /* sand */
    --card:#FBF7EF;          /* cream */
    --ink:#4A3F33;           /* deep brown */
    --ink-soft:#7C6E5C;      /* muted brown */
    --ink-faint:#A99B86;     /* faint brown */
    --camel:#C7A87C;         /* accent */
    --camel-deep:#B99A76;    /* accent deep */
    --line:#E6DBC9;          /* soft divider */
    --terra:#C08A72;         /* muted terracotta point */
    --shadow:0 10px 30px rgba(74,63,51,.10);
    --shadow-sm:0 4px 14px rgba(74,63,51,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Gothic A1','Noto Sans KR',sans-serif;
    background:#E9E0D0;
    display:flex;justify-content:center;align-items:flex-start;
    min-height:100vh;padding:26px 0;color:var(--ink);
  }
  .stage{width:390px}
  .veclabel{
    font-size:11px;color:#8b7d69;letter-spacing:.4px;
    margin:0 4px 10px;font-weight:600;text-transform:uppercase;
  }
  /* phone frame */
  .phone{
    width:390px;height:844px;border-radius:44px;overflow:hidden;
    background:linear-gradient(180deg,var(--bg2),var(--bg));
    box-shadow:var(--shadow);position:relative;
    display:flex;flex-direction:column;
  }
  .statusbar{
    height:44px;display:flex;align-items:center;justify-content:space-between;
    padding:0 26px;font-size:13px;font-weight:600;color:var(--ink);flex:none;
  }
  .statusbar .dots{display:flex;gap:5px;align-items:center;opacity:.75}
  .statusbar .dots span{width:5px;height:5px;border-radius:50%;background:var(--ink-soft)}

  .scroll{flex:1;overflow-y:auto;padding:6px 22px 0}
  .scroll::-webkit-scrollbar{display:none}

  /* header */
  header{padding:8px 2px 4px}
  .toprow{display:flex;align-items:center;justify-content:space-between}
  .logo{
    font-weight:800;font-size:24px;letter-spacing:-.5px;color:var(--ink);
  }
  .logo b{color:var(--camel-deep)}
  .avatars{display:flex;align-items:center}
  .ava{
    width:36px;height:36px;border-radius:50%;border:2.5px solid var(--card);
    box-shadow:var(--shadow-sm);
  }
  .ava.h{background:radial-gradient(circle at 35% 30%,#E7CBA6,#C7A87C 70%);}
  .ava.s{background:radial-gradient(circle at 35% 30%,#EAD0C4,#C08A72 72%);margin-left:-12px}
  .dday{
    margin-left:10px;background:var(--card);border:1px solid var(--line);
    border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;
    color:var(--camel-deep);box-shadow:var(--shadow-sm);white-space:nowrap;
  }
  .couplenames{
    margin-top:12px;font-size:13px;color:var(--ink-soft);font-weight:500;
  }
  .couplenames b{color:var(--ink);font-weight:700}

  /* 1년 전 오늘 – 아주 은은하게 */
  .throwback{
    margin-top:10px;display:flex;align-items:center;gap:9px;
    padding:8px 12px;border-radius:14px;
    background:rgba(199,168,124,.10);border:1px dashed rgba(185,154,118,.45);
  }
  .tb-thumb{
    width:26px;height:26px;border-radius:50%;flex:none;
    background:linear-gradient(140deg,#D8B88C,#B5906B);
    box-shadow:inset 0 0 6px rgba(74,63,51,.15);
  }
  .throwback span{font-size:11.5px;color:var(--ink-soft)}
  .throwback span b{color:var(--camel-deep);font-weight:700}

  /* month selector */
  .monthbar{
    margin:20px 2px 6px;display:flex;align-items:center;justify-content:space-between;
  }
  .monthpick{
    display:flex;align-items:center;gap:6px;font-size:19px;font-weight:800;
    color:var(--ink);letter-spacing:-.3px;
  }
  .monthpick .chev{font-size:13px;color:var(--camel-deep)}
  .monthpick .count{
    font-size:11px;font-weight:700;color:var(--ink-faint);margin-left:2px;
  }
  .navbtns{display:flex;gap:8px}
  .navbtns button{
    width:32px;height:32px;border-radius:50%;border:1px solid var(--line);
    background:var(--card);color:var(--ink-soft);font-size:14px;cursor:pointer;
    box-shadow:var(--shadow-sm);
  }

  /* calendar */
  .cal{
    margin-top:14px;background:var(--card);border-radius:26px;
    padding:18px 16px 20px;box-shadow:var(--shadow);border:1px solid rgba(230,219,201,.7);
  }
  .weekhead{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:10px}
  .weekhead div{
    text-align:center;font-size:11px;font-weight:700;color:var(--ink-faint);
    letter-spacing:.5px;
  }
  .weekhead div.sun{color:var(--terra)}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:12px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:5px}
  .num{font-size:10.5px;font-weight:600;color:var(--ink-soft);line-height:1}
  .cell.sun .num{color:var(--terra)}
  .cell.blank{visibility:hidden}

  /* photo thumb (circle) */
  .thumb{
    width:38px;height:38px;border-radius:50%;position:relative;
    box-shadow:inset 0 0 8px rgba(74,63,51,.14), 0 2px 6px rgba(74,63,51,.10);
  }
  /* empty dashed circle */
  .empty{
    width:38px;height:38px;border-radius:50%;
    border:1.5px dashed #D8CBB4;background:rgba(255,255,255,.35);
  }
  /* count badge */
  .badge{
    position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 3px;
    border-radius:9px;background:var(--camel-deep);color:#FBF7EF;
    font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center;
    border:2px solid var(--card);
  }
  /* today ring */
  .today .thumb, .today .empty{
    box-shadow:0 0 0 2.5px var(--camel), inset 0 0 8px rgba(74,63,51,.14),0 2px 8px rgba(74,63,51,.14);
  }
  .today .num{color:var(--camel-deep);font-weight:800}

  /* silhouette overlay inside some thumbs for couple-photo feel */
  .thumb.people::after{
    content:"";position:absolute;inset:0;border-radius:50%;
    background:
      radial-gradient(circle at 38% 62%, rgba(74,63,51,.22) 16%, transparent 17%),
      radial-gradient(circle at 62% 60%, rgba(74,63,51,.18) 15%, transparent 16%),
      radial-gradient(circle at 38% 40%, rgba(255,255,255,.30) 9%, transparent 10%),
      radial-gradient(circle at 62% 38%, rgba(255,255,255,.24) 8%, transparent 9%);
  }

  /* Today pill button */
  .todaybtn-wrap{display:flex;justify-content:center;margin:20px 0 12px}
  .todaybtn{
    display:inline-flex;align-items:center;gap:7px;
    background:linear-gradient(135deg,var(--camel),var(--camel-deep));
    color:#FBF7EF;font-weight:700;font-size:13px;letter-spacing:.3px;
    padding:11px 22px;border-radius:999px;border:none;cursor:pointer;
    box-shadow:0 8px 20px rgba(185,154,118,.40);
  }
  .todaybtn .dot{width:6px;height:6px;border-radius:50%;background:#FBF7EF;opacity:.9}

  /* tab bar */
  .tabbar{
    flex:none;height:74px;background:var(--card);border-top:1px solid var(--line);
    display:flex;align-items:flex-start;justify-content:space-around;padding-top:12px;
  }
  .tab{
    display:flex;flex-direction:column;align-items:center;gap:5px;
    font-size:10px;font-weight:600;color:var(--ink-faint);width:20%;
  }
  .tab .ic{width:22px;height:22px;stroke:var(--ink-faint);fill:none;stroke-width:1.8}
  .tab.on{color:var(--camel-deep)}
  .tab.on .ic{stroke:var(--camel-deep)}
</style>
</head>
<body>
  <div class="stage">
    <div class="veclabel">웜 샌드 · v2 톤온톤 포토캘린더 — 01 홈</div>
    <div class="phone">
      <div class="statusbar">
        <span>9:41</span>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>

      <div class="scroll">
        <header>
          <div class="toprow">
            <div class="logo">투<b>데이</b></div>
            <div class="avatars">
              <div class="ava h"></div>
              <div class="ava s"></div>
              <div class="dday">D+412</div>
            </div>
          </div>
          <div class="couplenames"><b>승환</b> &amp; <b>수정</b> · 우리의 하루하루</div>

          <div class="throwback">
            <div class="tb-thumb"></div>

        <div class="monthbar">
          <div class="monthpick">

            <span class="count">사진 14일</span>
          </div>
          <div class="navbtns">
            <button>‹</button>
            <button>›</button>
          </div>
        </div>

        <div class="cal">
          <div class="weekhead">
            <div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
          </div>
          <div class="grid">
            <!-- week 1: starts Wed(1) -->
            <div class="cell blank"></div>
            <div class="cell blank"></div>
            <div class="cell blank"></div>
            <div class="cell"><div class="thumb people" style="background:linear-gradient(140deg,#E8CDA6,#C9A374)"></div><div class="num">1</div></div>
            <div class="cell"><div class="empty"></div><div class="num">2</div></div>

            <div class="cell"><div class="empty"></div><div class="num">10</div></div>
            <div class="cell"><div class="thumb people" style="background:linear-gradient(140deg,#E2C7AF,#BE8E77)"></div><div class="num">11</div></div>

            <!-- week 3 -->
            <div class="cell sun"><div class="empty"></div><div class="num">12</div></div>
            <div class="cell"><div class="thumb" style="background:linear-gradient(150deg,#E9D0AC,#C7A67C)"></div><div class="num">13</div></div>
            <div class="cell"><div class="thumb people" style="background:linear-gradient(140deg,#D9C099,#B4926A)"></div><div class="num">14</div></div>
            <div class="cell"><div class="empty"></div><div class="num">15</div></div>
            <div class="cell"><div class="thumb" style="background:linear-gradient(150deg,#E5CAA4,#C0A075)"><span class="badge">4</span></div><div class="num">16</div></div>
            <div class="cell"><div class="thumb people" style="background:linear-gradient(140deg,#E7C9B2,#C08E77)"></div><div class="num">17</div></div>
            <div class="cell"><div class="empty"></div><div class="num">18</div></div>

            <!-- week 4: today = 19(sun) -->
            <div class="cell sun today"><div class="thumb people" style="background:linear-gradient(140deg,#EFD4B0,#CDA97D)"></div><div class="num">19</div></div>
            <div class="cell"><div class="empty"></div><div class="num">20</div></div>
            <div class="cell"><div class="thumb" style="background:linear-gradient(150deg,#E1C69E,#BC9B72)"></div><div class="num">21</div></div>
            <div class="cell"><div class="thumb people" style="background:linear-gradient(140deg,#E3C7AE,#BD8D76)"><span class="badge">2</span></div><div class="num">22</div></div>
            <div class="cell"><div class="empty"></div><div class="num">23</div></div>
            <div class="cell"><div class="empty"></div><div class="num">24</div></div>
            <div class="cell"><div class="thumb" style="background:linear-gradient(150deg,#E8CFAA,#C5A47A)"></div><div class="num">25</div></div>

            <!-- week 5 -->
            <div class="cell sun"><div class="empty"></div><div class="num">26</div></div>
            <div class="cell"><div class="thumb people" style="background:linear-gradient(140deg,#DDC29A,#B6946B)"></div><div class="num">27</div></div>
            <div class="cell"><div class="empty"></div><div class="num">28</div></div>
            <div class="cell"><div class="thumb" style="background:linear-gradient(150deg,#E6CCA6,#C1A076)"></div><div class="num">29</div></div>
            <div class="cell"><div class="empty"></div><div class="num">30</div></div>
            <div class="cell"><div class="empty"></div><div class="num">31</div></div>
            <div class="cell blank"></div>
          </div>
        </div>

        <div class="todaybtn-wrap">
          <button class="todaybtn"><span class="dot"></span>Today</button>
        </div>
        <div style="height:8px"></div>
      </div>

      <nav class="tabbar">
        <div class="tab on">
          <svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
          캘린더
        </div>
        <div class="tab">
          <svg class="ic" viewBox="0 0 24 24"><path d="M4 5h16v13H4z"/><path d="M4 15l5-5 4 4 3-3 4 4"/><circle cx="9" cy="9" r="1.4"/></svg>
          앨범
        </div>

          <svg class="ic" viewBox="0 0 24 24"><path d="M12 4v16M4 12h16"/></svg>

        </div>
        <div class="tab">
          <svg class="ic" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg>
          대화
        </div>
        <div class="tab">
          <svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
          우리
        </div>
      </nav>
    </div>
  </div>
</body>
</html>
