<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투데이 — 자유 일기 · 질문 고르기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;600;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Gothic A1", sans-serif;
    background: #F3E9DF;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    color: #5A4038;
  }
  .screen-label {
    font-size: 13px;
    font-weight: 600;
    color: #9C7B6C;
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }
  .phone {
    width: 390px;
    background: #FFF6EF;
    border-radius: 44px;
    box-shadow: 0 18px 50px rgba(90, 64, 56, 0.18);
    overflow: hidden;
    position: relative;
  }
  /* status bar */
  .statusbar {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    font-size: 14px;
    font-weight: 700;
    color: #5A4038;
  }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; font-size: 12px; }

  /* header */
  .header {
    padding: 8px 22px 4px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .back-btn {
    width: 34px; height: 34px;
    border-radius: 12px;
    background: #FFFDFA;
    box-shadow: 0 2px 8px rgba(90,64,56,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #7A5A4E;
  }
  .counter {
    font-family: "Jua", sans-serif;
    font-size: 15px;
    color: #FFFDFA;
    background: #FF8E72;
    border-radius: 999px;
    padding: 6px 14px;
    box-shadow: 0 4px 10px rgba(255,142,114,0.35);
  }
  .header h1 {
    font-family: "Jua", sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: #5A4038;
    margin-top: 16px;
  }
  .header .sub {
    font-size: 13px;
    color: #7A5A4E;
    margin-top: 6px;
    line-height: 1.5;
  }
  .header .sub b { color: #FF8E72; font-weight: 700; }

  /* template chips */
  .chips {
    display: flex;
    gap: 8px;
    padding: 16px 22px 6px;
  }
  .chip {
    font-size: 13px;
    font-weight: 600;
    padding: 8px 15px;
    border-radius: 999px;
    background: #FFFDFA;
    color: #7A5A4E;
    border: 1.5px solid #F1E2D6;
  }
  .chip.active {
    background: #FF8E72;
    color: #FFFDFA;
    border-color: #FF8E72;
    box-shadow: 0 4px 10px rgba(255,142,114,0.35);
  }

  /* question list */
  .list {
    padding: 12px 22px 140px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .qcard {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #FFFDFA;
    border: 1.5px solid #F1E2D6;
    border-radius: 18px;
    padding: 15px 16px;
    box-shadow: 0 2px 8px rgba(90,64,56,0.05);
  }
  .qcard .num {
    width: 26px; height: 26px;
    flex-shrink: 0;
    border-radius: 9px;
    background: #FFF1E8;
    color: #C89A87;
    font-size: 12px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .qcard .text {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: #5A4038;
    line-height: 1.45;
  }
  .qcard .check {
    width: 24px; height: 24px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid #E7D5C8;
    background: #FFFDFA;
  }
  .qcard.selected {
    border: 2px solid #FF8E72;
    background: #FFF9F4;
    box-shadow: 0 4px 14px rgba(255,142,114,0.18);
  }
  .qcard.selected .num {
    background: #FF8E72;
    color: #FFFDFA;
  }
  .qcard.selected .text { font-weight: 700; }
  .qcard.selected .check {
    border: none;
    background: #FF8E72;
    display: flex; align-items: center; justify-content: center;
    color: #FFFDFA;
    font-size: 13px;
    font-weight: 800;
    box-shadow: 0 3px 8px rgba(255,142,114,0.4);
  }

  /* bottom fixed */
  .bottom {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 14px 22px 26px;
    background: linear-gradient(to top, #FFF6EF 75%, rgba(255,246,239,0));
  }
  .cta {
    width: 100%;
    background: #FF8E72;
    color: #FFFDFA;
    border: none;
    border-radius: 18px;
    padding: 17px 0;
    font-family: "Gothic A1", sans-serif;
    font-size: 16px;
    font-weight: 800;
    box-shadow: 0 8px 20px rgba(255,142,114,0.4);
  }
  .cta-note {
    text-align: center;
    font-size: 12px;
    color: #A98876;
    margin-top: 10px;
  }
  .cta-note b { color: #FF8E72; font-weight: 700; }
</style>
</head>
<body>

<div class="screen-label">자유 모드 ① — 질문 고르기 (승환 · 먼저 쓰는 사람)</div>

<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">▮▮▮ ᯤ 🔋</span>
  </div>

  <div class="header">
    <div class="header-top">
      <div class="back-btn">‹</div>
      <div class="counter">3/3</div>
    </div>
    <h1>7월 15일 · 자유 일기</h1>
    <div class="sub">오늘의 질문 <b>3개</b>를 골라보세요 · 고른 질문에 답하며 일기를 써요</div>
  </div>

  <div class="chips">
    <div class="chip">데일리</div>
    <div class="chip">데이트</div>
    <div class="chip">여행</div>
    <div class="chip active">자유</div>
  </div>

  <div class="list">
    <div class="qcard selected">
      <div class="num">1</div>
      <div class="text">기억에 남는 장면 2~3가지</div>
      <div class="check">✓</div>
    </div>
    <div class="qcard">
      <div class="num">2</div>
      <div class="text">오늘 내가 느낀 감정 한 줄</div>
      <div class="check"></div>
    </div>
    <div class="qcard">
      <div class="num">3</div>
      <div class="text">오늘 우리가 잘 맞았던 순간</div>
      <div class="check"></div>
    </div>
    <div class="qcard selected">
      <div class="num">4</div>
      <div class="text">한 줄 요약 — 오늘은 “___”한 하루였다</div>
      <div class="check">✓</div>
    </div>
    <div class="qcard">
      <div class="num">5</div>
      <div class="text">고마웠던 순간</div>
      <div class="check"></div>
    </div>
    <div class="qcard selected">
      <div class="num">6</div>
      <div class="text">상대가 오늘 귀여웠던 순간</div>
      <div class="check">✓</div>
    </div>
    <div class="qcard">
      <div class="num">7</div>
      <div class="text">오늘 살짝 아쉬웠던 것</div>
      <div class="check"></div>
    </div>
    <div class="qcard">
      <div class="num">8</div>
      <div class="text">다음에 우리 같이 하고 싶은 것</div>
      <div class="check"></div>
    </div>
  </div>

  <div class="bottom">
    <button class="cta">이 질문으로 쓰기</button>
    <div class="cta-note">내가 고른 질문이 <b>수정님</b>에게도 오늘의 질문이 돼요 ✉️</div>
  </div>
</div>

</body>
</html>
