<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투데이 — 마이(우리)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;600;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Gothic A1', sans-serif;
    background:#EFE6DD;
    display:flex; flex-direction:column; align-items:center;
    padding:40px 0 60px; color:#5A4038;
  }
  .screen-label {
    font-size:12px; font-weight:600; color:#9B8478;
    letter-spacing:.06em; margin-bottom:10px;
  }
  .phone {
    width:390px; height:844px; background:#FFF6EF;
    border-radius:44px; overflow:hidden; position:relative;
    box-shadow:0 24px 60px rgba(90,64,56,.22), 0 2px 8px rgba(90,64,56,.10);
    display:flex; flex-direction:column;
  }
  /* status bar */
  .statusbar {
    height:48px; display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; font-size:14px; font-weight:700; color:#5A4038; flex-shrink:0;
  }
  .statusbar .icons { display:flex; gap:6px; align-items:center; }
  .sig { width:16px; height:10px; display:flex; align-items:flex-end; gap:1.5px; }
  .sig i { width:2.5px; background:#5A4038; border-radius:1px; }
  .sig i:nth-child(1){height:4px} .sig i:nth-child(2){height:6px} .sig i:nth-child(3){height:8px} .sig i:nth-child(4){height:10px}
  .wifi { font-size:11px; }
  .batt { width:22px; height:11px; border:1.5px solid #5A4038; border-radius:3px; position:relative; }
  .batt::after { content:''; position:absolute; inset:1.5px; right:5px; background:#5A4038; border-radius:1px; }
  .batt::before { content:''; position:absolute; right:-4px; top:2.5px; width:2px; height:4px; background:#5A4038; border-radius:0 1px 1px 0; }

  /* header */
  .header {
    padding:8px 24px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
  }
  .logo { font-family:'Jua', sans-serif; font-size:22px; color:#FF8E72; }
  .header .title { font-size:17px; font-weight:800; color:#5A4038; }

  .content { flex:1; overflow-y:auto; padding:0 20px 20px; }

  /* couple card */
  .couple-card {
    background:#FFFDFA; border-radius:24px; padding:26px 22px 22px;
    box-shadow:0 6px 20px rgba(255,142,114,.14), 0 1px 3px rgba(90,64,56,.05);
    text-align:center; margin-bottom:18px;
  }
  .avatars { display:flex; justify-content:center; margin-bottom:14px; }
  .avatar {
    width:76px; height:76px; border-radius:50%; position:relative; overflow:hidden;
    border:3.5px solid #FFFDFA; box-shadow:0 3px 10px rgba(255,142,114,.28);
  }
  .avatar.him { background:linear-gradient(135deg,#FFC7B0 0%,#FFA98C 100%); z-index:2; }
  .avatar.her { background:linear-gradient(135deg,#FFD9C4 0%,#FF9E80 100%); margin-left:-18px; z-index:1; }
  /* CSS silhouette: head + shoulders */
  .avatar::before {
    content:''; position:absolute; top:16px; left:50%; transform:translateX(-50%);
    width:26px; height:26px; border-radius:50%; background:rgba(255,253,250,.85);
  }
  .avatar::after {
    content:''; position:absolute; top:44px; left:50%; transform:translateX(-50%);
    width:48px; height:34px; border-radius:24px 24px 0 0; background:rgba(255,253,250,.85);
  }
  .couple-name { font-size:19px; font-weight:800; letter-spacing:-.01em; }
  .couple-name .dday {
    display:inline-block; margin-left:8px; font-size:13px; font-weight:800; color:#FF8E72;
    background:#FFF0E8; padding:3px 10px; border-radius:999px; vertical-align:2px;
  }
  .couple-sub { margin-top:6px; font-size:12.5px; color:#7A5A4E; }

  .stats {
    display:flex; margin-top:18px; padding-top:16px; border-top:1px solid #FBEADF;
  }
  .stat { flex:1; }
  .stat + .stat { border-left:1px solid #FBEADF; }
  .stat .num { font-size:18px; font-weight:800; color:#FF8E72; }
  .stat .num small { font-size:12px; font-weight:700; color:#5A4038; margin-left:1px; }
  .stat .lbl { font-size:11.5px; color:#7A5A4E; margin-top:3px; }

  /* menu list */
  .menu {
    background:#FFFDFA; border-radius:22px; overflow:hidden;
    box-shadow:0 4px 14px rgba(90,64,56,.06);
  }
  .menu-item {
    display:flex; align-items:center; gap:14px; padding:16px 18px;
    border-bottom:1px solid #FBEADF; cursor:pointer;
  }
  .menu-item:last-child { border-bottom:none; }
  .menu-ico {
    width:38px; height:38px; border-radius:13px; background:#FFF0E8;
    display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;
  }
  .menu-item .txt { flex:1; }
  .menu-item .txt .t { font-size:15px; font-weight:700; }
  .menu-item .txt .s { font-size:11.5px; color:#A98D80; margin-top:2px; }
  .chev { color:#D9C3B7; font-size:16px; font-weight:700; }

  /* bottom tabs */
  .tabbar {
    flex-shrink:0; background:#FFFDFA; border-top:1px solid #FBEADF;
    display:flex; align-items:flex-start; padding:8px 8px 22px; position:relative;
  }
  .tab {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:10.5px; font-weight:600; color:#B99E90; padding-top:6px;
  }
  .tab .ico { font-size:20px; line-height:1; }
  .tab.active { color:#FF8E72; font-weight:800; }
  .tab.write .plus {
    width:46px; height:46px; border-radius:50%; margin-top:-20px;
    background:linear-gradient(135deg,#FF8E72,#FFA98C);
    color:#FFFDFA; font-size:26px; font-weight:400; line-height:44px; text-align:center;
    box-shadow:0 6px 14px rgba(255,142,114,.4);
  }
  .home-indicator {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    width:130px; height:5px; border-radius:3px; background:#E5D5CA;
  }
</style>
</head>
<body>
  <div class="screen-label">01 · 마이(우리) 탭</div>
  <div class="phone">
    <div class="statusbar">
      <span>9:41</span>
      <span class="icons">
        <span class="sig"><i></i><i></i><i></i><i></i></span>
        <span class="wifi">&#9679;&#9679;&#9679;</span>
        <span class="batt"></span>
      </span>
    </div>

    <div class="header">
      <span class="logo">투데이</span>
      <span class="title">우리</span>
    </div>

    <div class="content">
      <div class="couple-card">
        <div class="avatars">
          <div class="avatar him"></div>
          <div class="avatar her"></div>
        </div>
        <div class="couple-name">승환 &amp; 수정 <span class="dday">D+412</span></div>
        <div class="couple-sub">2025년 5월 19일부터 함께 쓰는 중</div>
        <div class="stats">
          <div class="stat"><div class="num">214<small>편</small></div><div class="lbl">함께 쓴 일기</div></div>
          <div class="stat"><div class="num">128<small>장</small></div><div class="lbl">모은 사진</div></div>
          <div class="stat"><div class="num">23<small>곳</small></div><div class="lbl">다녀온 장소</div></div>
        </div>
      </div>

      <div class="menu">
        <div class="menu-item">
          <div class="menu-ico">&#128100;</div>
          <div class="txt"><div class="t">내 프로필 편집</div><div class="s">사진 · 애칭 · 생일</div></div>
          <span class="chev">&#8250;</span>
        </div>
        <div class="menu-item">
          <div class="menu-ico">&#127874;</div>
          <div class="txt"><div class="t">기념일 관리</div><div class="s">다가오는 기념일 2개</div></div>
          <span class="chev">&#8250;</span>
        </div>
        <div class="menu-item">
          <div class="menu-ico">&#128218;</div>
          <div class="txt"><div class="t">월말 결산 보기</div><div class="s">6월의 우리 이야기가 도착했어요</div></div>
          <span class="chev">&#8250;</span>
        </div>
        <div class="menu-item">
          <div class="menu-ico">&#128276;</div>
          <div class="txt"><div class="t">알림 설정</div></div>
          <span class="chev">&#8250;</span>
        </div>
        <div class="menu-item">
          <div class="menu-ico">&#128241;</div>
          <div class="txt"><div class="t">커플 위젯</div><div class="s">홈 화면에서 디데이 보기</div></div>
          <span class="chev">&#8250;</span>
        </div>
        <div class="menu-item">
          <div class="menu-ico">&#9881;&#65039;</div>
          <div class="txt"><div class="t">설정</div></div>
          <span class="chev">&#8250;</span>
        </div>
      </div>
    </div>

    <div class="tabbar">
      <div class="tab"><span class="ico">&#128197;</span>캘린더</div>
      <div class="tab"><span class="ico">&#128444;&#65039;</span>앨범</div>
      <div class="tab write"><span class="plus">+</span>기록</div>
      <div class="tab"><span class="ico">&#128172;</span>대화</div>
      <div class="tab active"><span class="ico">&#129293;</span>마이</div>
      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
