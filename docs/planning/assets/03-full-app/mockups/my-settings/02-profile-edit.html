<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투데이 — 프로필 편집</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;600;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Gothic A1', sans-serif;
    background:#EFE6DD;
    display:flex; flex-direction:column; align-items:center;
    padding:40px 0 60px; color:#5A4038;
  }
  .screen-label {
    font-size:12px; font-weight:600; color:#9B8478;
    letter-spacing:.06em; margin-bottom:10px;
  }
  .phone {
    width:390px; height:844px; background:#FFF6EF;
    border-radius:44px; overflow:hidden; position:relative;
    box-shadow:0 24px 60px rgba(90,64,56,.22), 0 2px 8px rgba(90,64,56,.10);
    display:flex; flex-direction:column;
  }
  .statusbar {
    height:48px; display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; font-size:14px; font-weight:700; color:#5A4038; flex-shrink:0;
  }
  .statusbar .icons { display:flex; gap:6px; align-items:center; }
  .sig { width:16px; height:10px; display:flex; align-items:flex-end; gap:1.5px; }
  .sig i { width:2.5px; background:#5A4038; border-radius:1px; }
  .sig i:nth-child(1){height:4px} .sig i:nth-child(2){height:6px} .sig i:nth-child(3){height:8px} .sig i:nth-child(4){height:10px}
  .wifi { font-size:11px; }
  .batt { width:22px; height:11px; border:1.5px solid #5A4038; border-radius:3px; position:relative; }
  .batt::after { content:''; position:absolute; inset:1.5px; right:5px; background:#5A4038; border-radius:1px; }
  .batt::before { content:''; position:absolute; right:-4px; top:2.5px; width:2px; height:4px; background:#5A4038; border-radius:0 1px 1px 0; }

  .navbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 20px 12px; flex-shrink:0;
  }
  .navbar .back { font-size:20px; font-weight:700; color:#7A5A4E; width:40px; }
  .navbar .title { font-size:17px; font-weight:800; }
  .navbar .spacer { width:40px; }

  .content { flex:1; overflow-y:auto; padding:4px 24px 24px; }

  .notice {
    background:#FFF0E8; border-radius:14px; padding:11px 14px;
    font-size:12px; font-weight:500; color:#B0715B; text-align:center;
    margin-bottom:26px; line-height:1.5;
  }
  .notice b { color:#FF8E72; font-weight:800; }

  /* profile photo */
  .photo-wrap { display:flex; justify-content:center; margin-bottom:30px; }
  .photo {
    width:128px; height:128px; border-radius:50%; position:relative;
    background:linear-gradient(135deg,#FFC7B0 0%,#FFA98C 55%,#FF8E72 100%);
    box-shadow:0 8px 22px rgba(255,142,114,.32);
  }
  .photo .sil-head {
    position:absolute; top:28px; left:50%; transform:translateX(-50%);
    width:42px; height:42px; border-radius:50%; background:rgba(255,253,250,.88);
  }
  .photo .sil-body {
    position:absolute; top:76px; left:50%; transform:translateX(-50%);
    width:78px; height:54px; border-radius:40px 40px 0 0; background:rgba(255,253,250,.88);
  }
  .photo { overflow:hidden; }
  .cam-badge {
    position:absolute; right:-2px; bottom:-2px; z-index:2;
    width:40px; height:40px; border-radius:50%;
    background:#FF8E72; border:3px solid #FFF6EF;
    display:flex; align-items:center; justify-content:center;
    font-size:17px; color:#FFFDFA; cursor:pointer;
    box-shadow:0 4px 10px rgba(255,142,114,.4);
  }
  .photo-outer { position:relative; }

  /* fields */
  .field { margin-bottom:18px; }
  .field label { display:block; font-size:12.5px; font-weight:700; color:#7A5A4E; margin-bottom:8px; }
  .field .input {
    background:#FFFDFA; border:1.5px solid #F3E2D6; border-radius:16px;
    padding:14px 16px; font-size:15px; font-weight:600; color:#5A4038;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 2px 6px rgba(90,64,56,.04);
  }
  .field .hint { font-size:11px; color:#B99E90; margin-top:6px; padding-left:4px; }
  .field .input .suffix { font-size:13px; color:#C9B2A5; }

  .save-btn {
    width:100%; margin-top:10px; padding:16px;
    background:linear-gradient(135deg,#FF8E72,#FFA98C);
    color:#FFFDFA; font-family:'Gothic A1',sans-serif; font-size:16px; font-weight:800;
    border:none; border-radius:18px; cursor:pointer;
    box-shadow:0 8px 18px rgba(255,142,114,.36);
  }

  /* dim + bottom sheet (open state) */
  .dim {
    position:absolute; inset:0; background:rgba(90,64,56,.34); z-index:10;
  }
  .sheet {
    position:absolute; left:0; right:0; bottom:0; z-index:11;
    background:#FFFDFA; border-radius:28px 28px 0 0;
    padding:10px 20px 34px;
    box-shadow:0 -10px 30px rgba(90,64,56,.18);
  }
  .sheet .grabber {
    width:44px; height:5px; border-radius:3px; background:#EBD9CC; margin:4px auto 14px;
  }
  .sheet .sheet-title { text-align:center; font-size:14px; font-weight:800; color:#7A5A4E; margin-bottom:14px; }
  .sheet-item {
    display:flex; align-items:center; gap:14px;
    padding:15px 14px; border-radius:16px; cursor:pointer;
  }
  .sheet-item:hover { background:#FFF6EF; }
  .sheet-item .ico {
    width:40px; height:40px; border-radius:14px; background:#FFF0E8;
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .sheet-item .t { font-size:15px; font-weight:700; }
  .sheet-item .s { font-size:11.5px; color:#A98D80; margin-top:2px; }
  .sheet-item.reset .t { color:#7A5A4E; }
  .sheet-cancel {
    margin-top:8px; width:100%; padding:14px; text-align:center;
    background:#FFF0E8; border:none; border-radius:16px;
    font-family:'Gothic A1',sans-serif; font-size:14.5px; font-weight:800; color:#B0715B; cursor:pointer;
  }
</style>
</head>
<body>
  <div class="screen-label">02 · 프로필 편집 (사진 변경 시트 열림)</div>
  <div class="phone">
    <div class="statusbar">
      <span>9:41</span>
      <span class="icons">
        <span class="sig"><i></i><i></i><i></i><i></i></span>
        <span class="wifi">&#9679;&#9679;&#9679;</span>
        <span class="batt"></span>
      </span>
    </div>

    <div class="navbar">
      <span class="back">&#8249;</span>
      <span class="title">내 프로필 편집</span>
      <span class="spacer"></span>
    </div>

    <div class="content">
      <div class="notice">사진을 바꾸면 <b>수정님 화면에도 바로 반영</b>돼요</div>

      <div class="photo-wrap">
        <div class="photo-outer">
          <div class="photo">
            <div class="sil-head"></div>
            <div class="sil-body"></div>
          </div>
          <div class="cam-badge">&#128247;</div>
        </div>
      </div>

      <div class="field">
        <label>이름</label>
        <div class="input">승환</div>
      </div>
      <div class="field">
        <label>애칭</label>
        <div class="input">승화니 <span class="suffix">2/8자</span></div>
        <div class="hint">수정님에게 이 애칭으로 보여요</div>
      </div>
      <div class="field">
        <label>생일</label>
        <div class="input">1999년 3월 14일 <span class="suffix">&#9660;</span></div>
      </div>

      <button class="save-btn">저장</button>
    </div>

    <!-- 사진 변경 하단 시트 (열린 상태) -->
    <div class="dim"></div>
    <div class="sheet">
      <div class="grabber"></div>
      <div class="sheet-title">프로필 사진 변경</div>
      <div class="sheet-item">
        <div class="ico">&#128247;</div>
        <div><div class="t">카메라로 촬영</div><div class="s">지금 바로 찍어서 올려요</div></div>
      </div>
      <div class="sheet-item">
        <div class="ico">&#128444;&#65039;</div>
        <div><div class="t">앨범에서 선택</div><div class="s">갤러리에서 사진을 골라요</div></div>
      </div>
      <div class="sheet-item reset">
        <div class="ico">&#127775;</div>
        <div><div class="t">기본 이미지로</div><div class="s">투데이 기본 프로필로 돌려놓기</div></div>
      </div>
      <button class="sheet-cancel">닫기</button>
    </div>
  </div>
</body>
</html>
