<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투데이 · 01 홈 (포토 캘린더)</title>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;600;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Gothic A1', sans-serif;
    background:#EDE4DB;
    display:flex; flex-direction:column; align-items:center;
    padding:40px 20px 80px; color:#5A4038;
  }
  .screen-label {
    font-size:12px; font-weight:700; letter-spacing:.12em;
    color:#8A7264; margin-bottom:14px; text-transform:uppercase;
  }
  .phone {
    width:390px; height:844px; background:#FFF6EF;
    border-radius:46px; overflow:hidden; position:relative;
    box-shadow:0 24px 60px rgba(90,64,56,.22), 0 2px 0 rgba(255,255,255,.6) inset;
    display:flex; flex-direction:column;
  }
  /* ---------- status bar ---------- */
  .statusbar {
    height:48px; display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; font-size:14px; font-weight:700; color:#5A4038; flex:none;
  }
  .statusbar .icons { display:flex; gap:6px; align-items:center; font-size:12px; letter-spacing:1px; }
  /* ---------- header ---------- */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 20px 6px; flex:none;
  }
  .logo { font-family:'Jua', sans-serif; font-size:26px; color:#FF8E72; letter-spacing:.02em; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .avatars { display:flex; }
  .avatar {
    width:34px; height:34px; border-radius:50%; border:2.5px solid #FFFDFA;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; color:#fff;
    box-shadow:0 2px 6px rgba(90,64,56,.15);
  }
  .avatar.him { background:linear-gradient(135deg,#FFB58C,#F08A5D); z-index:2; }
  .avatar.her { background:linear-gradient(135deg,#F9A08C,#E5735E); margin-left:-10px; z-index:1; }
  .dday {
    background:#FFFDFA; border:1px solid #FFDCCB;
    color:#FF8E72; font-size:12px; font-weight:800;
    padding:6px 12px; border-radius:999px;
    box-shadow:0 2px 8px rgba(255,142,114,.14);
  }
  /* ---------- memory banner ---------- */
  .memory-banner {
    margin:8px 20px 0; padding:10px 14px;
    background:linear-gradient(90deg,#FFF1E6,#FFFBF6);
    border:1px solid #FFE4D3; border-radius:14px;
    display:flex; align-items:center; gap:8px;
    font-size:12.5px; color:#7A5A4E; flex:none;
  }
  .memory-banner .dot {
    width:26px; height:26px; border-radius:50%; flex:none;
    background:linear-gradient(135deg,#FFD9A8,#F5A67A);
    display:flex; align-items:center; justify-content:center; font-size:13px;
  }
  .memory-banner b { color:#5A4038; font-weight:700; }
  .memory-banner .arrow { margin-left:auto; color:#D9B8A6; font-size:14px; }
  /* ---------- month title ---------- */
  .month-row {
    display:flex; align-items:baseline; justify-content:space-between;
    padding:20px 22px 6px; flex:none;
  }
  .month-title { font-size:20px; font-weight:800; color:#5A4038; }
  .month-title small { font-size:13px; font-weight:600; color:#B08F7F; margin-right:6px; }
  .month-title .caret { font-size:12px; color:#C9A18E; margin-left:4px; }
  .today-pill {
    font-size:12px; font-weight:800; color:#fff;
    background:linear-gradient(135deg,#FF9E80,#FF8E72);
    padding:7px 14px; border-radius:999px; border:none;
    box-shadow:0 4px 12px rgba(255,142,114,.35);
  }
  /* ---------- calendar ---------- */
  .weekdays {
    display:grid; grid-template-columns:repeat(7,1fr);
    padding:6px 16px 2px; flex:none;
  }
  .weekdays span { text-align:center; font-size:11px; font-weight:700; color:#B99C8C; }
  .weekdays span.sun { color:#E8907D; }
  .cal {
    display:grid; grid-template-columns:repeat(7,1fr);
    row-gap:10px; padding:6px 16px 4px; flex:none;
  }
  .day { display:flex; flex-direction:column; align-items:center; gap:3px; position:relative; }
  .circle {
    width:42px; height:42px; border-radius:50%; position:relative;
    box-shadow:0 3px 8px rgba(90,64,56,.12);
  }
  .circle.empty {
    box-shadow:none; background:transparent;
    border:1.6px dashed #E8CDBC;
  }
  .circle.future { border-color:#F0DED2; }
  .daynum { font-size:10.5px; font-weight:700; color:#9A7B6C; }
  .day.today .daynum { color:#FF8E72; font-weight:800; }
  .day.today .circle {
    outline:2.5px solid #FF8E72; outline-offset:2.5px;
  }
  .badge {
    position:absolute; top:-3px; right:-3px;
    min-width:16px; height:16px; border-radius:999px;
    background:#FF8E72; color:#fff; font-size:9.5px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
    padding:0 4px; border:1.8px solid #FFF6EF;
  }
  /* warm gradient "photos" */
  .p1 { background:linear-gradient(135deg,#FFD3A5,#FD9D78); }
  .p2 { background:linear-gradient(150deg,#F7C59F,#C97B63); }
  .p3 { background:linear-gradient(135deg,#FFE0B5,#E8A87C); }
  .p4 { background:linear-gradient(160deg,#E8B796,#A96F52); }
  .p5 { background:linear-gradient(135deg,#FFC7B0,#E5735E); }
  .p6 { background:linear-gradient(145deg,#F5D8B8,#D19C6B); }
  .p7 { background:linear-gradient(135deg,#FFCDA8,#DE8560); }
  .p8 { background:linear-gradient(150deg,#EFC3A4,#B77E5E); }
  .p9 { background:linear-gradient(135deg,#FFDDBE,#F0946C); }
  .p10 { background:linear-gradient(140deg,#E9C4A0,#C08552); }
  .p11 { background:linear-gradient(135deg,#FFCBB5,#D9765F); }
  .p12 { background:linear-gradient(155deg,#F8D2AC,#CE8A64); }
  .p13 { background:linear-gradient(135deg,#FFD8B0,#E88E6A); }
  /* ---------- summary card ---------- */
  .summary {
    margin:auto 18px 12px; background:#FFFDFA;
    border-radius:20px; padding:16px 18px;
    box-shadow:0 8px 24px rgba(90,64,56,.10);
    display:flex; align-items:center; gap:14px; flex:none;
  }
  .summary .thumb {
    width:48px; height:48px; border-radius:16px; flex:none;
    background:linear-gradient(135deg,#FFC7B0,#FF8E72);
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .summary .txt { flex:1; min-width:0; }
  .summary .txt .t1 { font-size:11.5px; font-weight:700; color:#C9A18E; margin-bottom:3px; }
  .summary .txt .t2 { font-size:14px; font-weight:700; color:#5A4038; line-height:1.4; }
  .summary .txt .t2 em { font-style:normal; color:#FF8E72; }
  .summary .go {
    width:34px; height:34px; border-radius:50%; flex:none;
    background:#FFF1E8; color:#FF8E72;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:800;
  }
  /* ---------- tab bar ---------- */
  .tabbar {
    flex:none; height:86px; background:#FFFDFA;
    border-top:1px solid #F5E4D7;
    display:flex; align-items:flex-start; padding-top:10px;
    position:relative;
  }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; font-weight:700; color:#C4A794; }
  .tab .ico { font-size:20px; }
  .tab.active { color:#FF8E72; }
  .tab.write .ico-plus {
    width:52px; height:52px; border-radius:50%; margin-top:-28px;
    background:linear-gradient(135deg,#FFA98C,#FF8E72);
    color:#fff; font-size:26px; font-weight:400;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 18px rgba(255,142,114,.45);
    border:4px solid #FFFDFA;
  }
  .tab.write { color:#FF8E72; }
  .home-indicator {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    width:130px; height:5px; border-radius:99px; background:#E3D2C6;
  }
</style>
</head>
<body>
<div class="screen-label">01 · 홈 — 포토 캘린더</div>
<div class="phone">

  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">●●●●○ &nbsp;〶 &nbsp;▮</span>
  </div>

  <div class="header">
    <div class="logo">투데이</div>
    <div class="header-right">
      <div class="avatars">
        <div class="avatar him">승환</div>
        <div class="avatar her">수정</div>
      </div>
      <div class="dday">D+412 🧡</div>
    </div>
  </div>

  <div class="memory-banner">
    <span class="dot">🕰️</span>
    <span><b>1년 전 오늘</b> · 한강 피크닉을 다녀왔어요</span>
    <span class="arrow">›</span>
  </div>

  <div class="month-row">
    <div class="month-title"><small>2026</small>7월의 우리 <span class="caret">▾</span></div>
    <button class="today-pill">Today</button>
  </div>

  <div class="weekdays">
    <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
  </div>

  <div class="cal">
    <!-- week 1 : 7/1 = 수 -->
    <div class="day"></div>
    <div class="day"></div>
    <div class="day"></div>
    <div class="day"><div class="circle p1"></div><span class="daynum">1</span></div>
    <div class="day"><div class="circle p2"></div><span class="daynum">2</span></div>
    <div class="day"><div class="circle empty"></div><span class="daynum">3</span></div>
    <div class="day"><div class="circle p3"></div><span class="daynum">4</span></div>
    <!-- week 2 : 5–11 -->
    <div class="day"><div class="circle p4"><span class="badge">2</span></div><span class="daynum">5</span></div>
    <div class="day"><div class="circle empty"></div><span class="daynum">6</span></div>
    <div class="day"><div class="circle p5"></div><span class="daynum">7</span></div>
    <div class="day"><div class="circle p6"></div><span class="daynum">8</span></div>
    <div class="day"><div class="circle empty"></div><span class="daynum">9</span></div>
    <div class="day"><div class="circle p7"></div><span class="daynum">10</span></div>
    <div class="day"><div class="circle p8"></div><span class="daynum">11</span></div>
    <!-- week 3 : 12–18, today = 18 -->
    <div class="day"><div class="circle p9"><span class="badge">3</span></div><span class="daynum">12</span></div>
    <div class="day"><div class="circle empty"></div><span class="daynum">13</span></div>
    <div class="day"><div class="circle p10"></div><span class="daynum">14</span></div>
    <div class="day"><div class="circle p11"></div><span class="daynum">15</span></div>
    <div class="day"><div class="circle empty"></div><span class="daynum">16</span></div>
    <div class="day"><div class="circle p12"></div><span class="daynum">17</span></div>
    <div class="day today"><div class="circle p13"></div><span class="daynum">18</span></div>
    <!-- week 4 : 19–25 (미래) -->
    <div class="day"><div class="circle empty future"></div><span class="daynum">19</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">20</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">21</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">22</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">23</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">24</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">25</span></div>
    <!-- week 5 : 26–31 -->
    <div class="day"><div class="circle empty future"></div><span class="daynum">26</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">27</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">28</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">29</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">30</span></div>
    <div class="day"><div class="circle empty future"></div><span class="daynum">31</span></div>
    <div class="day"></div>
  </div>

  <div class="summary">
    <div class="thumb">☕</div>
    <div class="txt">
      <div class="t1">오늘 · 7월 18일 토요일</div>
      <div class="t2">성수 카페 데이트 — <em>수정님이 기다리고 있어요</em></div>
    </div>
    <div class="go">›</div>
  </div>

  <div class="tabbar">
    <div class="tab active"><span class="ico">🗓️</span>캘린더</div>
    <div class="tab"><span class="ico">🖼️</span>앨범</div>
    <div class="tab write"><span class="ico-plus">＋</span>기록</div>
    <div class="tab"><span class="ico">💬</span>대화</div>
    <div class="tab"><span class="ico">🙂</span>마이</div>
    <div class="home-indicator"></div>
  </div>

</div>
</body>
</html>
