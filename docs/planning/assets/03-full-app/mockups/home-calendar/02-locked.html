<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투데이 · 02 잠금 상태 상세</title>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;600;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Gothic A1', sans-serif;
    background:#EDE4DB;
    display:flex; flex-direction:column; align-items:center;
    padding:40px 20px 80px; color:#5A4038;
  }
  .screen-label {
    font-size:12px; font-weight:700; letter-spacing:.12em;
    color:#8A7264; margin-bottom:14px; text-transform:uppercase;
  }
  .phone {
    width:390px; height:844px; background:#FFF6EF;
    border-radius:46px; overflow:hidden; position:relative;
    box-shadow:0 24px 60px rgba(90,64,56,.22), 0 2px 0 rgba(255,255,255,.6) inset;
    display:flex; flex-direction:column;
  }
  .statusbar {
    height:48px; display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; font-size:14px; font-weight:700; color:#5A4038; flex:none;
  }
  .statusbar .icons { display:flex; gap:6px; align-items:center; font-size:12px; letter-spacing:1px; }
  /* ---------- top nav ---------- */
  .nav {
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 18px 8px; flex:none;
  }
  .nav .back {
    width:36px; height:36px; border-radius:50%;
    background:#FFFDFA; box-shadow:0 2px 8px rgba(90,64,56,.10);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; color:#7A5A4E; font-weight:800;
  }
  .nav .date-wrap { text-align:center; }
  .nav .date { font-size:16px; font-weight:800; color:#5A4038; }
  .nav .sub { font-size:11px; font-weight:700; color:#FF8E72; margin-top:2px; }
  .nav .spacer { width:36px; }
  /* ---------- location chips ---------- */
  .chips { display:flex; justify-content:center; gap:8px; padding:6px 20px 14px; flex:none; }
  .chip {
    font-size:12px; font-weight:700; color:#7A5A4E;
    background:#FFFDFA; border:1px solid #F5E0D2;
    padding:7px 13px; border-radius:999px;
    box-shadow:0 2px 6px rgba(90,64,56,.06);
  }
  .chip.coral { color:#FF8E72; border-color:#FFDCCB; background:#FFF3EC; }
  /* ---------- her locked card ---------- */
  .content { flex:1; overflow:hidden; padding:0 20px; display:flex; flex-direction:column; }
  .writer-row { display:flex; align-items:center; gap:9px; margin-bottom:10px; flex:none; }
  .writer-row .avatar {
    width:34px; height:34px; border-radius:50%;
    background:linear-gradient(135deg,#F9A08C,#E5735E);
    color:#fff; font-size:11px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
    border:2.5px solid #FFFDFA; box-shadow:0 2px 6px rgba(90,64,56,.15);
  }
  .writer-row .name { font-size:14px; font-weight:800; color:#5A4038; }
  .writer-row .stat { font-size:11.5px; font-weight:700; color:#FF8E72; background:#FFF1E8; padding:4px 10px; border-radius:999px; }
  .locked-card {
    position:relative; border-radius:24px; overflow:hidden;
    background:#FFFDFA; box-shadow:0 10px 28px rgba(90,64,56,.12);
    flex:1; min-height:0;
  }
  .locked-inner { position:absolute; inset:0; padding:18px; filter:blur(9px); transform:scale(1.03); }
  .locked-photo {
    height:46%; border-radius:18px;
    background:
      radial-gradient(120px 90px at 30% 35%, #FFE0BE 0%, transparent 60%),
      radial-gradient(150px 120px at 75% 70%, #E5876A 0%, transparent 65%),
      linear-gradient(140deg,#FFCDA8 0%, #E08863 55%, #B26548 100%);
  }
  .locked-line { height:13px; border-radius:99px; background:#EBD8CA; margin-top:14px; }
  .locked-line.w80 { width:80%; }
  .locked-line.w95 { width:95%; }
  .locked-line.w60 { width:60%; }
  .locked-line.w88 { width:88%; }
  .locked-chiprow { display:flex; gap:8px; margin-top:16px; }
  .locked-chip { width:70px; height:24px; border-radius:99px; background:#F4DFCF; }
  .lock-overlay {
    position:absolute; inset:0; z-index:2;
    background:linear-gradient(180deg, rgba(255,246,239,.30) 0%, rgba(255,246,239,.72) 62%, rgba(255,246,239,.94) 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:28px;
  }
  .lock-badge {
    width:74px; height:74px; border-radius:50%;
    background:#FFFDFA; box-shadow:0 10px 24px rgba(90,64,56,.18);
    display:flex; align-items:center; justify-content:center;
    font-size:32px; margin-bottom:18px; border:1px solid #FFE4D3;
  }
  .lock-title { font-size:18px; font-weight:800; color:#5A4038; margin-bottom:8px; }
  .lock-desc { font-size:13px; font-weight:500; color:#7A5A4E; line-height:1.65; }
  .lock-desc b { color:#FF8E72; font-weight:800; }
  /* ---------- bottom cta ---------- */
  .cta-area { flex:none; padding:16px 20px 14px; }
  .hint {
    text-align:center; font-size:12px; font-weight:600; color:#B08F7F; margin-bottom:12px;
  }
  .cta {
    width:100%; height:56px; border:none; border-radius:18px;
    background:linear-gradient(135deg,#FFA98C,#FF8E72);
    color:#fff; font-family:'Gothic A1',sans-serif; font-size:16px; font-weight:800;
    box-shadow:0 10px 24px rgba(255,142,114,.42);
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .home-indicator {
    width:130px; height:5px; border-radius:99px; background:#E3D2C6;
    margin:10px auto 8px;
  }
</style>
</head>
<body>
<div class="screen-label">02 · 잠금 상태 상세 — 상대는 썼고 나는 아직</div>
<div class="phone">

  <div class="statusbar">
    <span>9:41</span>
    <span class="icons">●●●●○ &nbsp;〶 &nbsp;▮</span>
  </div>

  <div class="nav">
    <div class="back">‹</div>
    <div class="date-wrap">
      <div class="date">7월 18일 토요일</div>
      <div class="sub">오늘</div>
    </div>
    <div class="spacer"></div>
  </div>

  <div class="chips">
    <span class="chip coral">📍 성수 · 카페 온화</span>
    <span class="chip">☕ 카페 데이트</span>
  </div>

  <div class="content">
    <div class="writer-row">
      <div class="avatar">수정</div>
      <span class="name">수정의 오늘</span>
      <span class="stat">작성 완료 ✓</span>
    </div>

    <div class="locked-card">
      <div class="locked-inner">
        <div class="locked-photo"></div>
        <div class="locked-line w80"></div>
        <div class="locked-line w95"></div>
        <div class="locked-line w88"></div>
        <div class="locked-line w60"></div>
        <div class="locked-chiprow">
          <span class="locked-chip"></span>
          <span class="locked-chip"></span>
        </div>
      </div>
      <div class="lock-overlay">
        <div class="lock-badge">🔒</div>
        <div class="lock-title">아직 열 수 없어요</div>
        <div class="lock-desc">
          수정님은 오늘의 일기를 남겼어요.<br>
          <b>내 일기를 쓰면</b> 서로의 하루가 열려요.
        </div>
      </div>
    </div>
  </div>

  <div class="cta-area">
    <div class="hint">사진 1장과 짧은 글이면 충분해요 · 3분이면 끝!</div>
    <button class="cta">✍️ 지금 쓰러 가기</button>
    <div class="home-indicator"></div>
  </div>

</div>
</body>
</html>
