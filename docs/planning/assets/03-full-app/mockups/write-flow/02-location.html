<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투데이 — 위치 추가</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;600;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Gothic A1', sans-serif;
    background: #EDE4DB;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 0 80px;
    color: #5A4038;
  }
  .screen-label { font-size: 12px; font-weight: 600; color: #8A7365; letter-spacing: 0.06em; margin-bottom: 12px; }
  .phone {
    width: 390px; height: 844px; background: #FFF6EF;
    border-radius: 44px; overflow: hidden; position: relative;
    box-shadow: 0 24px 60px rgba(90,64,56,0.18), 0 0 0 10px #3B2E29;
    display: flex; flex-direction: column;
  }
  .statusbar {
    height: 48px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; font-size: 14px; font-weight: 700; color: #5A4038;
    position: relative; z-index: 5; background: #FFF6EF;
  }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .sig { width: 17px; height: 11px; display: flex; align-items: flex-end; gap: 1.5px; }
  .sig i { width: 2.8px; background: #5A4038; border-radius: 1px; display: block; }
  .sig i:nth-child(1){height:4px}.sig i:nth-child(2){height:6px}.sig i:nth-child(3){height:8px}.sig i:nth-child(4){height:11px}
  .wifi { width: 16px; height: 11px; background: #5A4038; clip-path: polygon(50% 100%, 0 0, 100% 0); border-radius: 2px; }
  .batt { width: 24px; height: 12px; border: 1.5px solid #5A4038; border-radius: 3.5px; position: relative; }
  .batt::before { content:''; position: absolute; left: 1.5px; top: 1.5px; bottom: 1.5px; width: 14px; background: #5A4038; border-radius: 1.5px; }
  .batt::after { content:''; position: absolute; right: -4px; top: 3px; width: 2px; height: 4px; background: #5A4038; border-radius: 0 2px 2px 0; }

  /* search header over map */
  .search-wrap { position: relative; z-index: 5; padding: 8px 20px 0; display: flex; gap: 10px; align-items: center; }
  .back {
    width: 44px; height: 44px; border-radius: 15px; background: #FFFDFA; flex: none;
    display: flex; align-items: center; justify-content: center; font-size: 17px; color: #7A5A4E;
    box-shadow: 0 4px 14px rgba(90,64,56,0.14);
  }
  .search {
    flex: 1; height: 44px; background: #FFFDFA; border-radius: 15px;
    display: flex; align-items: center; gap: 9px; padding: 0 15px;
    box-shadow: 0 4px 14px rgba(90,64,56,0.14);
  }
  .search .icon { font-size: 14px; opacity: .7; }
  .search .q { font-size: 14px; font-weight: 600; color: #5A4038; }
  .search .cursor { display: inline-block; width: 1.5px; height: 15px; background: #FF8E72; vertical-align: -2px; animation: blink 1.1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .search .clear {
    margin-left: auto; width: 18px; height: 18px; border-radius: 50%;
    background: #EBD9CC; color: #FFFBF6; font-size: 11px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }

  /* recent chips */
  .recent { position: relative; z-index: 5; padding: 12px 20px 0; }
  .recent-label { font-size: 11px; font-weight: 700; color: #9B7A6A; margin-bottom: 8px; text-shadow: 0 1px 0 rgba(255,251,246,.8); }
  .recent-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .rchip {
    padding: 8px 13px; border-radius: 16px; font-size: 12px; font-weight: 600;
    background: rgba(255,253,250,0.92); color: #7A5A4E;
    box-shadow: 0 3px 10px rgba(90,64,56,0.12);
  }

  /* map */
  .map {
    position: absolute; inset: 0; top: 0;
    background:
      /* roads */
      linear-gradient(90deg, transparent 0 18%, #F6E7DA 18% 21.5%, transparent 21.5%),
      linear-gradient(90deg, transparent 0 62%, #F6E7DA 62% 66.5%, transparent 66.5%),
      linear-gradient(0deg, transparent 0 38%, #F6E7DA 38% 42.5%, transparent 42.5%),
      linear-gradient(0deg, transparent 0 68%, #F6E7DA 68% 71.5%, transparent 71.5%),
      linear-gradient(45deg, transparent 0 55%, #F8ECE1 55% 57.5%, transparent 57.5%),
      /* fine grid */
      repeating-linear-gradient(0deg, transparent 0 43px, rgba(214,182,160,0.22) 43px 44px),
      repeating-linear-gradient(90deg, transparent 0 43px, rgba(214,182,160,0.22) 43px 44px),
      /* blocks */
      radial-gradient(circle at 24% 26%, #F3E0D0 0 60px, transparent 61px),
      radial-gradient(circle at 80% 20%, #EFE3D3 0 70px, transparent 71px),
      radial-gradient(circle at 78% 58%, #F3E0D0 0 55px, transparent 56px),
      radial-gradient(circle at 15% 62%, #EFE3D3 0 50px, transparent 51px),
      linear-gradient(180deg, #FBEFE3 0%, #F7E8D9 60%, #F3E2D2 100%);
  }
  /* river band */
  .map::before {
    content: ''; position: absolute; left: -40px; right: -40px; top: 52%; height: 64px;
    background: linear-gradient(180deg, #EAD9C6, #E4CFBB);
    transform: rotate(-7deg); border-radius: 40px; opacity: .75;
  }
  .map-fade { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,246,239,.55) 0%, transparent 22%, transparent 55%, rgba(255,246,239,.3) 70%); }

  /* pin */
  .pin-wrap { position: absolute; left: 50%; top: 37%; transform: translate(-50%, -100%); z-index: 4; text-align: center; }
  .pin {
    width: 40px; height: 40px; margin: 0 auto;
    background: linear-gradient(135deg, #FF9E7E, #FF8E72);
    border-radius: 50% 50% 50% 4px; transform: rotate(45deg);
    box-shadow: 0 8px 18px rgba(255,142,114,0.5);
    display: flex; align-items: center; justify-content: center;
  }
  .pin .dot { width: 14px; height: 14px; background: #FFFBF6; border-radius: 50%; transform: rotate(-45deg); }
  .pin-shadow { width: 22px; height: 7px; background: rgba(90,64,56,0.22); border-radius: 50%; margin: 7px auto 0; filter: blur(1px); }
  .pin-tag {
    display: inline-block; margin-top: 8px; padding: 7px 12px; border-radius: 12px;
    background: #5A4038; color: #FFF6EF; font-size: 11.5px; font-weight: 700;
    box-shadow: 0 4px 12px rgba(90,64,56,0.3);
  }

  /* bottom sheet */
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 6;
    background: #FFFDFA; border-radius: 28px 28px 0 0;
    box-shadow: 0 -12px 34px rgba(90,64,56,0.16);
    padding: 12px 20px 28px;
  }
  .grabber { width: 44px; height: 5px; border-radius: 3px; background: #EBD9CC; margin: 0 auto 14px; }
  .sheet-title { font-size: 13px; font-weight: 800; color: #7A5A4E; margin-bottom: 12px; }
  .sheet-title span { color: #FF8E72; }

  .result {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 14px; border-radius: 18px; margin-bottom: 8px;
    border: 1.5px solid transparent;
  }
  .result.selected { background: #FFF1E8; border-color: #FFC7B0; }
  .result .r-pin {
    width: 38px; height: 38px; border-radius: 13px; flex: none;
    background: #FFF6EF; display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .result.selected .r-pin { background: #FF8E72; }
  .result .r-body { flex: 1; min-width: 0; }
  .result .r-name { font-size: 14.5px; font-weight: 700; color: #5A4038; }
  .result .r-addr { font-size: 11.5px; color: #B08A78; margin-top: 3px; }
  .result .r-check {
    width: 22px; height: 22px; border-radius: 50%; flex: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800;
  }
  .result.selected .r-check { background: #FF8E72; color: #FFF; box-shadow: 0 3px 8px rgba(255,142,114,0.4); }
  .result:not(.selected) .r-check { border: 1.5px solid #EBD9CC; color: transparent; }

  .save-btn {
    width: 100%; margin-top: 12px; padding: 17px 0; border: none; border-radius: 20px;
    background: linear-gradient(135deg, #FF9E7E, #FF8E72);
    color: #FFF; font-family: 'Gothic A1'; font-size: 16px; font-weight: 800; letter-spacing: 0.03em;
    box-shadow: 0 8px 22px rgba(255,142,114,0.45);
  }
</style>
</head>
<body>
<div class="screen-label">02 · 데이트 위치 추가</div>
<div class="phone">
  <div class="map"><div class="map-fade"></div></div>

  <div class="pin-wrap">
    <div class="pin"><div class="dot"></div></div>
    <div class="pin-shadow"></div>
    <div class="pin-tag">대림창고 성수</div>
  </div>

  <div class="statusbar">
    <span>9:41</span>
    <span class="icons"><span class="sig"><i></i><i></i><i></i><i></i></span><span class="wifi"></span><span class="batt"></span></span>
  </div>

  <div class="search-wrap">
    <div class="back">‹</div>
    <div class="search">
      <span class="icon">🔍</span>
      <span class="q">성수<span class="cursor"></span></span>
      <span class="clear">×</span>
    </div>
  </div>

  <div class="recent">
    <div class="recent-label">최근 방문한 장소</div>
    <div class="recent-chips">
      <div class="rchip">🥐 을지로 커피한약방</div>
      <div class="rchip">🌉 한강 뚝섬유원지</div>
      <div class="rchip">🍜 성수 소문난감자탕</div>
    </div>
  </div>

  <div class="sheet">
    <div class="grabber"></div>
    <div class="sheet-title">‘<span>성수</span>’ 검색 결과 3곳</div>

    <div class="result selected">
      <div class="r-pin">📍</div>
      <div class="r-body">
        <div class="r-name">대림창고 성수</div>
        <div class="r-addr">서울 성동구 성수이로 78 · 카페</div>
      </div>
      <div class="r-check">✓</div>
    </div>

    <div class="result">
      <div class="r-pin">☕️</div>
      <div class="r-body">
        <div class="r-name">어니언 성수</div>
        <div class="r-addr">서울 성동구 아차산로9길 8 · 베이커리 카페</div>
      </div>
      <div class="r-check">✓</div>
    </div>

    <div class="result">
      <div class="r-pin">🏭</div>
      <div class="r-body">
        <div class="r-name">성수연방</div>
        <div class="r-addr">서울 성동구 성수이로14길 14 · 복합문화공간</div>
      </div>
      <div class="r-check">✓</div>
    </div>

    <button class="save-btn">이 위치로 저장</button>
  </div>
</div>
</body>
</html>
