<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투데이 — 03 프로필 설정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;600;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Gothic A1', sans-serif;
    background:linear-gradient(160deg, #FFEDE2 0%, #FFF6EF 45%, #FFE3D4 100%);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:48px 20px; color:#5A4038;
  }
  .frame-label { font-size:12px; font-weight:600; color:#B08A7A; letter-spacing:.08em; margin-bottom:10px; }
  .phone {
    width:390px; height:844px; background:#FFFBF6; border-radius:46px;
    box-shadow:0 24px 60px rgba(122,90,78,.22), 0 4px 14px rgba(122,90,78,.10);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
    border:1px solid rgba(255,255,255,.8);
  }
  .statusbar {
    height:47px; display:flex; align-items:center; justify-content:space-between;
    padding:0 28px 0 32px; font-size:14px; font-weight:600; color:#5A4038; flex-shrink:0;
  }
  .statusbar .icons { display:flex; align-items:center; gap:6px; }
  .sig { display:flex; align-items:flex-end; gap:1.5px; height:11px; }
  .sig i { width:3px; background:#5A4038; border-radius:1px; display:block; }
  .sig i:nth-child(1){height:4px}.sig i:nth-child(2){height:6px}
  .sig i:nth-child(3){height:8px}.sig i:nth-child(4){height:11px}
  .wifi { width:16px; height:12px; position:relative; }
  .wifi::before { content:""; position:absolute; inset:0;
    background:radial-gradient(circle at 50% 100%, #5A4038 0 18%, transparent 19% 36%, #5A4038 37% 54%, transparent 55% 72%, #5A4038 73% 90%, transparent 91%);
    -webkit-mask:conic-gradient(from -45deg at 50% 100%, #000 0 90deg, transparent 90deg); }
  .batt { width:25px; height:12px; border:1.5px solid #5A4038; border-radius:4px; position:relative; }
  .batt::before { content:""; position:absolute; inset:1.5px; right:5px; background:#5A4038; border-radius:1.5px; }
  .batt::after { content:""; position:absolute; right:-4px; top:3px; width:2px; height:5px; background:#5A4038; border-radius:0 2px 2px 0; }

  .screen { flex:1; display:flex; flex-direction:column; padding:8px 28px 32px; }

  /* top nav + steps */
  .topnav { display:flex; align-items:center; justify-content:space-between; height:36px; }
  .back { width:34px; height:34px; border-radius:12px; background:#FFF0E7; border:none;
    display:flex; align-items:center; justify-content:center; color:#7A5A4E; font-size:16px; cursor:pointer; }
  .steps { display:flex; align-items:center; gap:8px; }
  .step { width:8px; height:8px; border-radius:50%; background:#F1D8CB; }
  .step.done { background:#FFC7B0; }
  .step.now { width:24px; border-radius:5px; background:#FF8E72; }
  .step-num { font-size:12px; font-weight:700; color:#B08A7A; }

  .header { margin-top:26px; }
  .header h1 { font-size:24px; font-weight:800; line-height:1.4; letter-spacing:-.01em; }
  .header h1 b { color:#FF8E72; }
  .header p { margin-top:8px; font-size:13.5px; color:#7A5A4E; line-height:1.6; }

  /* photo uploader */
  .photo-wrap { margin:38px auto 0; position:relative; width:140px; height:140px; }
  .photo { width:140px; height:140px; border-radius:50%;
    background:linear-gradient(180deg,#FFC7B0 0%,#FFE3D6 100%);
    border:4px solid #FFFDFA; box-shadow:0 12px 28px rgba(255,142,114,.28);
    position:relative; overflow:hidden; }
  .photo::before { content:""; position:absolute; top:28px; left:50%; transform:translateX(-50%);
    width:46px; height:46px; border-radius:50%; background:#FFF6EF; }
  .photo::after { content:""; position:absolute; top:80px; left:50%; transform:translateX(-50%);
    width:80px; height:56px; border-radius:36px 36px 0 0; background:#FFF6EF; }
  .cam-badge { position:absolute; right:2px; bottom:2px; width:42px; height:42px; border-radius:50%;
    background:#FF8E72; border:3px solid #FFFBF6; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 14px rgba(255,142,114,.4); }
  .cam { width:19px; height:14px; background:#fff; border-radius:4px; position:relative; }
  .cam::before { content:""; position:absolute; top:-4px; left:5px; width:9px; height:5px;
    background:#fff; border-radius:2px 2px 0 0; }
  .cam::after { content:""; position:absolute; top:3.5px; left:6px; width:7px; height:7px;
    border-radius:50%; background:#FF8E72; }
  .photo-hint { text-align:center; margin-top:14px; font-size:12.5px; color:#B08A7A; font-weight:500; }

  /* form */
  .form { margin-top:34px; display:flex; flex-direction:column; gap:20px; }
  .field label { display:flex; align-items:baseline; gap:6px; font-size:13.5px; font-weight:700; color:#5A4038; margin:0 4px 9px; }
  .field label .opt { font-size:11.5px; font-weight:500; color:#B08A7A; }
  .field input { width:100%; height:54px; border-radius:16px; border:1.5px solid #EFD9CD;
    background:#FFFDFA; padding:0 18px; font-family:'Gothic A1',sans-serif;
    font-size:15px; font-weight:600; color:#5A4038; outline:none; }
  .field input.filled { border-color:#FF8E72; box-shadow:0 0 0 3px rgba(255,142,114,.12); }
  .field input::placeholder { color:#CDAF9F; font-weight:500; }
  .field .helper { margin:8px 4px 0; font-size:11.5px; color:#B08A7A; }

  .next-btn { margin-top:auto; height:56px; border:none; border-radius:18px; cursor:pointer;
    background:linear-gradient(180deg,#FF8E72,#FF9F80); color:#fff;
    font-family:'Gothic A1',sans-serif; font-size:16px; font-weight:700;
    box-shadow:0 10px 22px rgba(255,142,114,.35); }

  .home-ind { width:134px; height:5px; border-radius:3px; background:#E8D3C8; margin:14px auto 0; }
</style>
</head>
<body>
  <div class="frame-label">온보딩 · 03 프로필 설정 (2/3)</div>
  <div class="phone">
    <div class="statusbar">
      <span>9:41</span>
      <span class="icons">
        <span class="sig"><i></i><i></i><i></i><i></i></span>
        <span class="wifi"></span>
        <span class="batt"></span>
      </span>
    </div>

    <div class="screen">
      <div class="topnav">
        <button class="back">‹</button>
        <div class="steps">
          <span class="step done"></span>
          <span class="step now"></span>
          <span class="step"></span>
        </div>
        <span class="step-num">2 / 3</span>
      </div>

      <div class="header">
        <h1>일기장에서 쓸<br><b>내 프로필</b>을 만들어요</h1>
        <p>사진과 이름은 나중에 언제든 바꿀 수 있어요</p>
      </div>

      <div class="photo-wrap">
        <div class="photo"></div>
        <div class="cam-badge"><span class="cam"></span></div>
      </div>
      <div class="photo-hint">사진을 눌러 프로필을 등록해 주세요</div>

      <div class="form">
        <div class="field">
          <label>이름</label>
          <input class="filled" value="승환">
        </div>
        <div class="field">
          <label>애칭 <span class="opt">선택</span></label>
          <input placeholder="수정이가 부르는 애칭이 있나요?">
          <div class="helper">애칭을 등록하면 일기장에서 애칭으로 불러드려요 🧡</div>
        </div>
      </div>

      <button class="next-btn">다음</button>

      <div class="home-ind"></div>
    </div>
  </div>
</body>
</html>
