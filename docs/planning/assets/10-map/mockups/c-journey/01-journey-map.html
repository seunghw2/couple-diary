<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여정 지도</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:#EDE7E1; display:flex; justify-content:center; padding:24px;
    color:#5A4038;
  }
  .phone {
    width:390px; height:844px; background:#FFFDFA; border-radius:44px;
    overflow:hidden; position:relative; box-shadow:0 24px 60px rgba(90,64,56,.22);
    display:flex; flex-direction:column;
  }
  /* status bar */
  .statusbar {
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; font-size:14px; font-weight:600; color:#5A4038; z-index:30;
    position:relative; flex-shrink:0;
  }
  .statusbar .dots { display:flex; gap:5px; align-items:center; }
  .statusbar .bars { display:flex; gap:2px; align-items:flex-end; height:11px; }
  .statusbar .bars i { width:3px; background:#5A4038; border-radius:1px; display:block; }
  .statusbar .bars i:nth-child(1){height:4px}.statusbar .bars i:nth-child(2){height:6px}
  .statusbar .bars i:nth-child(3){height:8px}.statusbar .bars i:nth-child(4){height:11px}
  .batt { width:22px; height:11px; border:1.4px solid #5A4038; border-radius:3px; position:relative; }
  .batt::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:#5A4038;border-radius:0 1px 1px 0;}
  .batt i{position:absolute;left:1.4px;top:1.4px;bottom:1.4px;width:70%;background:#5A4038;border-radius:1px;}

  /* header */
  .label { font-size:11px; letter-spacing:.14em; color:#C98A76; font-weight:700; text-transform:uppercase; }
  .header { padding:6px 24px 14px; flex-shrink:0; }
  .header h1 { font-size:23px; font-weight:800; letter-spacing:-.02em; margin-top:5px; }
  .header .sub { font-size:13px; color:#A98A80; margin-top:5px; font-weight:500; }
  .header .sub b { color:#FF8E72; font-weight:800; }

  /* map */
  .mapwrap { flex:1; position:relative; margin:0 16px; border-radius:26px; overflow:hidden;
    background:
      radial-gradient(120% 80% at 20% 10%, #FFF6EF 0%, #FBEDE4 55%, #F4E2D6 100%);
    box-shadow:inset 0 0 0 1px rgba(255,142,114,.10), 0 10px 26px rgba(90,64,56,.10);
  }
  /* faux streets */
  .street { position:absolute; background:rgba(255,255,255,.55); border-radius:20px; }
  .river { position:absolute; background:linear-gradient(90deg,#DCEAF0,#CFE3EC); opacity:.75; }
  .block { position:absolute; background:rgba(255,255,255,.32); border-radius:12px; }

  /* journey svg */
  .mapsvg { position:absolute; inset:0; width:100%; height:100%; }

  /* pins */
  .pin {
    position:absolute; transform:translate(-50%,-100%); z-index:5;
    display:flex; flex-direction:column; align-items:center; cursor:pointer;
  }
  .pin .bubble {
    width:34px; height:34px; border-radius:50% 50% 50% 4px; transform:rotate(45deg);
    background:#FF8E72; box-shadow:0 6px 14px rgba(255,142,114,.5);
    display:flex; align-items:center; justify-content:center;
    border:2.5px solid #FFFDFA;
  }
  .pin .bubble span { transform:rotate(-45deg); color:#fff; font-size:15px; font-weight:800; }
  .pin.small .bubble { width:28px; height:28px; }
  .pin.small .bubble span { font-size:13px; }
  .pin .tag {
    margin-top:9px; background:#FFFDFA; color:#5A4038; font-size:11px; font-weight:700;
    padding:4px 9px; border-radius:20px; box-shadow:0 3px 10px rgba(90,64,56,.16);
    white-space:nowrap;
  }
  .pin.latest .bubble { background:#FF6F4D; width:40px; height:40px;
    box-shadow:0 0 0 6px rgba(255,142,114,.22),0 8px 18px rgba(255,142,114,.55); }
  .pin.latest .bubble span { font-size:16px; }
  .pin.start .bubble { background:#FFB89E; }

  /* start heart badge */
  .heart { width:12px; height:12px; position:relative; }
  .heart::before,.heart::after{content:"";position:absolute;width:6px;height:9px;border-radius:6px 6px 0 0;background:#fff;top:0;}
  .heart::before{left:6px;transform:rotate(45deg);transform-origin:0 100%;}
  .heart::after{left:0;transform:rotate(-45deg);transform-origin:100% 100%;}

  /* mini timeline */
  .timeline { flex-shrink:0; padding:14px 22px 6px; }
  .timeline .thead { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .timeline .thead .t1 { font-size:13px; font-weight:800; }
  .timeline .thead .t2 { font-size:11px; color:#B49A90; font-weight:600; }
  .track { position:relative; height:34px; }
  .track .line { position:absolute; top:16px; left:0; right:0; height:3px; background:#F1E1D7; border-radius:3px; }
  .track .fill { position:absolute; top:16px; left:0; width:100%; height:3px; background:linear-gradient(90deg,#FFB89E,#FF8E72); border-radius:3px; }
  .track .tick { position:absolute; top:11px; width:2px; height:12px; background:#E4CDBF; border-radius:2px; }
  .track .tlabel { position:absolute; top:24px; font-size:9px; color:#B49A90; font-weight:700; transform:translateX(-50%); }
  .track .knob { position:absolute; top:7px; width:20px; height:20px; border-radius:50%; background:#FF6F4D; border:3px solid #FFFDFA; box-shadow:0 3px 10px rgba(255,111,77,.5); transform:translateX(-50%); }

  /* tabbar */
  .tabbar {
    flex-shrink:0; height:82px; display:flex; padding:8px 10px 22px;
    border-top:1px solid #F3E7DE; background:#FFFDFA;
  }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; }
  .tab .ic { width:24px; height:24px; position:relative; }
  .tab .lb { font-size:10px; font-weight:700; color:#C3AEA5; }
  .tab.active .lb { color:#FF8E72; }
  .ic svg { width:24px; height:24px; display:block; }
  .tab .st { stroke:#C3AEA5; }
  .tab.active .st { stroke:#FF8E72; }
  .tab.active .fl { fill:#FF8E72; }
</style>
</head>
<body>
  <div class="phone">
    <!-- status bar -->
    <div class="statusbar">
      <span>9:41</span>
      <div class="dots">
        <div class="bars"><i></i><i></i><i></i><i></i></div>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="#5A4038"><path d="M8.5 2.5c2 0 3.8.8 5.1 2l1.1-1.2C14.1 1.6 11.4.5 8.5.5S2.9 1.6 1.3 3.3l1.1 1.2c1.3-1.2 3.1-2 5.1-2Zm0 3c1.1 0 2.1.4 2.9 1.1l1.1-1.2c-1-.9-2.5-1.5-4-1.5s-3 .6-4 1.5l1.1 1.2c.8-.7 1.8-1.1 2.9-1.1Zm0 3c.5 0 1 .2 1.3.6l-1.3 1.4-1.3-1.4c.3-.4.8-.6 1.3-.6Z"/></svg>
        <div class="batt"><i></i></div>
      </div>
    </div>

    <!-- header -->
    <div class="header">
      <div class="label">우리의 지도</div>
      <h1>추억 여정</h1>
      <div class="sub">첫 데이트부터 <b>288일</b> · 발자취 12곳</div>
    </div>

    <!-- map -->
    <div class="mapwrap">
      <!-- faux city -->
      <div class="river" style="left:-40px;top:120px;width:520px;height:60px;transform:rotate(-14deg);"></div>
      <div class="street" style="left:40px;top:0;width:8px;height:100%;"></div>
      <div class="street" style="left:210px;top:0;width:8px;height:100%;transform:rotate(6deg);"></div>
      <div class="street" style="left:0;top:280px;width:100%;height:8px;transform:rotate(-3deg);"></div>
      <div class="street" style="left:0;top:430px;width:100%;height:8px;transform:rotate(2deg);"></div>
      <div class="block" style="left:60px;top:40px;width:70px;height:80px;"></div>
      <div class="block" style="left:250px;top:60px;width:90px;height:70px;"></div>
      <div class="block" style="left:70px;top:320px;width:100px;height:70px;"></div>
      <div class="block" style="left:240px;top:320px;width:90px;height:90px;"></div>
      <div class="block" style="left:60px;top:470px;width:110px;height:80px;"></div>
      <div class="block" style="left:250px;top:470px;width:90px;height:70px;"></div>

      <!-- journey line -->
      <svg class="mapsvg" viewBox="0 0 358 560" preserveAspectRatio="none">
        <path d="M70,470 C120,430 90,340 150,300 C210,260 130,200 200,160 C255,128 210,90 290,80"
              fill="none" stroke="#FF8E72" stroke-width="4" stroke-linecap="round"
              stroke-dasharray="2 12" opacity=".85"/>
        <path d="M70,470 C120,430 90,340 150,300 C210,260 130,200 200,160 C255,128 210,90 290,80"
              fill="none" stroke="#FF8E72" stroke-width="4.5" stroke-linecap="round" opacity=".28"/>
      </svg>

      <!-- pins (positioned in %) -->
      <div class="pin start small" style="left:19.5%; top:84%;">
        <div class="bubble"><span><div class="heart"></div></span></div>
        <div class="tag">첫 데이트 · 성수 카페</div>
      </div>
      <div class="pin small" style="left:42%; top:54%;">
        <div class="bubble"><span>4</span></div>
        <div class="tag">한강 피크닉</div>
      </div>
      <div class="pin small" style="left:56%; top:29%;">
        <div class="bubble"><span>8</span></div>
        <div class="tag">경복궁 산책</div>
      </div>
      <div class="pin latest" style="left:81%; top:14.5%;">
        <div class="bubble"><span>12</span></div>
        <div class="tag" style="font-weight:800;color:#FF6F4D;">최근 · 남산 야경</div>
      </div>
    </div>

    <!-- mini timeline -->
    <div class="timeline">
      <div class="thead">
        <div class="t1">타임라인</div>
        <div class="t2">밀어서 그때로 돌아가기</div>
      </div>
      <div class="track">
        <div class="line"></div>
        <div class="fill"></div>
        <div class="tick" style="left:2%;"></div><div class="tlabel" style="left:2%;">10월</div>
        <div class="tick" style="left:26%;"></div><div class="tlabel" style="left:26%;">12월</div>
        <div class="tick" style="left:50%;"></div><div class="tlabel" style="left:50%;">2월</div>
        <div class="tick" style="left:74%;"></div><div class="tlabel" style="left:74%;">4월</div>
        <div class="tick" style="left:98%;"></div><div class="tlabel" style="left:98%;">지금</div>
        <div class="knob" style="left:98%;"></div>
      </div>
    </div>

    <!-- tabbar -->
    <div class="tabbar">
      <div class="tab">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><path class="st" d="M3 10.5 12 4l9 6.5"/><path class="st" d="M5 9.5V20h14V9.5" stroke-linejoin="round"/><path class="st" d="M10 20v-5h4v5" /></svg></div>
        <div class="lb">홈</div>
      </div>
      <div class="tab">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><rect class="st" x="4" y="5" width="16" height="16" rx="3"/><path class="st" d="M4 9h16M8 3v4M16 3v4"/></svg></div>
        <div class="lb">달력</div>
      </div>
      <div class="tab active">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><path class="fl" d="M12 2c-3.6 0-6.5 2.9-6.5 6.5 0 4.6 6.5 12.5 6.5 12.5s6.5-7.9 6.5-12.5C18.5 4.9 15.6 2 12 2Z"/><circle cx="12" cy="8.5" r="2.4" fill="#FFFDFA"/></svg></div>
        <div class="lb">지도</div>
      </div>
      <div class="tab">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><path class="st" d="M4 6h16M4 12h16M4 18h10" stroke-linecap="round"/></svg></div>
        <div class="lb">일기</div>
      </div>
      <div class="tab">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><circle class="st" cx="12" cy="8" r="3.6"/><path class="st" d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/></svg></div>
        <div class="lb">우리</div>
      </div>
    </div>
  </div>
</body>
</html>
