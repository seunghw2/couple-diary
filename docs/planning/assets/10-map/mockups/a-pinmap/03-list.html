<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>love today — 지도 A안 · 리스트 뷰</title>
<style>
  :root{
    --coral:#FF8E72; --coral-deep:#F5744F; --cream:#FFF6EF; --paper:#FFFDFA;
    --ink:#5A4038; --ink-soft:#9A857C; --line:#F0E1D6; --gold:#F5B544;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;}
  body{background:#EDE3DC;display:flex;flex-direction:column;align-items:center;gap:10px;padding:28px 0 48px;min-height:100vh;}
  .label{font-size:12px;color:#8B7A70;letter-spacing:.3px;}
  .phone{width:390px;height:844px;background:var(--cream);border-radius:44px;overflow:hidden;position:relative;box-shadow:0 22px 60px rgba(90,64,56,.22);display:flex;flex-direction:column;}

  .statusbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;font-size:15px;font-weight:600;color:var(--ink);flex:none;}
  .sb-right{display:flex;align-items:center;gap:6px;}
  .sb-bat{width:22px;height:11px;border:1.5px solid var(--ink);border-radius:3px;position:relative;}
  .sb-bat::after{content:"";position:absolute;top:2px;left:2px;bottom:2px;width:13px;background:var(--ink);border-radius:1px;}
  .sb-bat::before{content:"";position:absolute;right:-3px;top:3px;height:4px;width:2px;background:var(--ink);border-radius:1px;}
  .sb-sig{display:flex;gap:2px;align-items:flex-end;}
  .sb-sig i{width:3px;background:var(--ink);border-radius:1px;}
  .sb-sig i:nth-child(1){height:5px}.sb-sig i:nth-child(2){height:8px}.sb-sig i:nth-child(3){height:11px}.sb-sig i:nth-child(4){height:14px}

  .header{padding:6px 20px 12px;flex:none;}
  .htitle{display:flex;align-items:baseline;gap:8px;}
  .htitle h1{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-.3px;}
  .htitle .cnt{font-size:20px;font-weight:800;color:var(--coral-deep);}
  .chips{margin-top:12px;display:flex;gap:8px;overflow:hidden;}
  .chip{height:32px;padding:0 14px;border-radius:16px;background:var(--paper);border:1px solid var(--line);display:flex;align-items:center;font-size:12.5px;color:var(--ink);white-space:nowrap;}
  .chip.on{background:var(--coral);border-color:var(--coral);color:#fff;font-weight:600;}

  .scroll{flex:1;overflow-y:auto;padding:6px 18px 20px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:12px;margin-bottom:14px;display:flex;gap:14px;box-shadow:0 6px 16px rgba(90,64,56,.06);}
  .cover{width:92px;height:92px;border-radius:16px;flex:none;position:relative;overflow:hidden;}
  .c1{background:linear-gradient(135deg,#FFD9C7,#FFB59A);}
  .c2{background:linear-gradient(135deg,#FFE4B8,#F5C36B);}
  .c3{background:linear-gradient(135deg,#D8E9CF,#B9D6A6);}
  .c4{background:linear-gradient(135deg,#F7CBD9,#EFA0BC);}
  .cover .cnt{position:absolute;top:7px;right:7px;height:22px;min-width:22px;padding:0 6px;background:rgba(90,64,56,.55);color:#fff;border-radius:11px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;}
  .cover .cnt .h{width:9px;height:8px;position:relative;display:inline-block;}
  .cover .cnt .h::before,.cover .cnt .h::after{content:"";position:absolute;width:5px;height:7px;background:#fff;border-radius:5px 5px 0 0;top:0;transform-origin:0 100%;}
  .cover .cnt .h::before{left:1px;transform:rotate(-45deg);}
  .cover .cnt .h::after{left:1px;transform:rotate(45deg);transform-origin:100% 100%;}

  .cbody{flex:1;min-width:0;display:flex;flex-direction:column;}
  .row1{display:flex;align-items:center;gap:7px;}
  .pname{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.3px;}
  .cat{font-size:10.5px;font-weight:700;color:var(--coral-deep);background:var(--cream);border:1px solid var(--line);padding:2px 8px;border-radius:10px;}
  .row2{margin-top:5px;font-size:12px;color:var(--ink-soft);}
  .stars{color:var(--gold);letter-spacing:1px;font-size:12.5px;margin-top:6px;}
  .row3{margin-top:auto;display:flex;align-items:center;gap:8px;padding-top:9px;}
  .avat{display:flex;}
  .avat span{width:20px;height:20px;border-radius:50%;border:2px solid var(--paper);font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;}
  .avat span:nth-child(2){margin-left:-7px;}
  .a-s{background:var(--coral);}.a-j{background:#8FB7C4;}
  .last{font-size:11.5px;color:var(--ink-soft);}

  .tabbar{height:84px;background:var(--paper);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:10px 6px 0;flex:none;}
  .tab{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10.5px;color:var(--ink-soft);width:60px;}
  .tab.on{color:var(--coral-deep);font-weight:700;}
  .ic{width:24px;height:24px;position:relative;}
  .ic-cal{border:2px solid currentColor;border-radius:5px;}
  .ic-cal::before{content:"";position:absolute;top:-1px;left:4px;right:4px;height:4px;border-top:2px solid currentColor;}
  .ic-cal::after{content:"";position:absolute;top:8px;left:3px;right:3px;bottom:4px;border-top:2px solid currentColor;}
  .ic-alb{border:2px solid currentColor;border-radius:5px;overflow:hidden;}
  .ic-alb::before{content:"";position:absolute;left:3px;bottom:3px;width:7px;height:7px;background:currentColor;border-radius:50%;}
  .ic-alb::after{content:"";position:absolute;right:-1px;bottom:2px;border-left:9px solid transparent;border-right:6px solid transparent;border-bottom:11px solid currentColor;}
  .ic-log{border:2px solid currentColor;border-radius:5px;}
  .ic-log::before{content:"";position:absolute;left:5px;top:6px;right:5px;height:2px;background:currentColor;box-shadow:0 5px 0 currentColor,0 10px 0 currentColor;}
  .ic-map .p{width:20px;height:20px;background:currentColor;border-radius:50% 50% 50% 0;transform:rotate(-45deg);position:absolute;left:2px;top:0;}
  .ic-map .p::after{content:"";position:absolute;inset:6px;background:var(--paper);border-radius:50%;transform:rotate(45deg);}
  .ic-set{border:2px solid currentColor;border-radius:50%;}
  .ic-set::after{content:"";position:absolute;inset:6px;border:2px solid currentColor;border-radius:50%;}

  /* floating map toggle */
  .toggle{position:absolute;left:50%;transform:translateX(-50%);bottom:100px;z-index:25;height:42px;background:var(--ink);border-radius:21px;display:flex;padding:4px;box-shadow:0 10px 24px rgba(90,64,56,.28);}
  .toggle button{border:none;background:none;font-size:13px;font-weight:700;color:rgba(255,255,255,.6);padding:0 20px;border-radius:17px;display:flex;align-items:center;gap:6px;}
  .toggle button.on{background:var(--coral);color:#fff;}
</style>
</head>
<body>
  <div class="label">love today · 지도 A안(핀맵) · 03 리스트 뷰</div>
  <div class="phone">
    <div class="statusbar">
      <span>9:41</span>
      <div class="sb-right">
        <div class="sb-sig"><i></i><i></i><i></i><i></i></div>
        <span style="font-size:12px">5G</span>
        <div class="sb-bat"></div>
      </div>
    </div>

    <div class="header">
      <div class="htitle"><h1>우리가 함께 간 곳</h1><span class="cnt">23곳</span></div>
      <div class="chips">
        <div class="chip on">최근순</div>
        <div class="chip">자주 간 곳</div>
        <div class="chip">별점순</div>
        <div class="chip">카페</div>
      </div>
    </div>

    <div class="scroll">
      <div class="card">
        <div class="cover c1"><span class="cnt"><span class="h"></span>4</span></div>
        <div class="cbody">
          <div class="row1"><span class="pname">성수 어니언</span><span class="cat">카페</span></div>
          <div class="row2">서울 성동구 아차산로9길</div>
          <div class="stars">★★★★☆</div>
          <div class="row3">
            <div class="avat"><span class="a-s">승</span><span class="a-j">수</span></div>
            <span class="last">최근 2026.06.21</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="cover c2"><span class="cnt"><span class="h"></span>3</span></div>
        <div class="cbody">
          <div class="row1"><span class="pname">한남 소전서림</span><span class="cat">전시</span></div>
          <div class="row2">서울 용산구 대사관로</div>
          <div class="stars">★★★★★</div>
          <div class="row3">
            <div class="avat"><span class="a-s">승</span><span class="a-j">수</span></div>
            <span class="last">최근 2026.05.30</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="cover c3"><span class="cnt"><span class="h"></span>2</span></div>
        <div class="cbody">
          <div class="row1"><span class="pname">서울숲</span><span class="cat">산책</span></div>
          <div class="row2">서울 성동구 뚝섬로</div>
          <div class="stars">★★★★☆</div>
          <div class="row3">
            <div class="avat"><span class="a-s">승</span><span class="a-j">수</span></div>
            <span class="last">최근 2026.04.18</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="cover c4"><span class="cnt"><span class="h"></span>1</span></div>
        <div class="cbody">
          <div class="row1"><span class="pname">망원 리틀넥</span><span class="cat">맛집</span></div>
          <div class="row2">서울 마포구 포은로</div>
          <div class="stars">★★★★☆</div>
          <div class="row3">
            <div class="avat"><span class="a-s">승</span><span class="a-j">수</span></div>
            <span class="last">최근 2026.02.09</span>
          </div>
        </div>
      </div>
    </div>

    <div class="toggle">
      <button><span style="width:12px;height:12px;background:currentColor;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:inline-block"></span>지도</button>
      <button class="on">리스트</button>
    </div>

    <div class="tabbar">
      <div class="tab"><span class="ic ic-cal"></span>달력</div>
      <div class="tab"><span class="ic ic-alb"></span>앨범</div>
      <div class="tab"><span class="ic ic-log"></span>기록</div>
      <div class="tab on"><span class="ic ic-map"><span class="p"></span></span>지도</div>
      <div class="tab"><span class="ic ic-set"></span>설정</div>
    </div>
  </div>
</body>
</html>
