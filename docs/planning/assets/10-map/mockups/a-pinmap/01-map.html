<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>love today — 지도 A안 · 지도 메인</title>
<style>
  :root{
    --coral:#FF8E72; --coral-deep:#F5744F; --cream:#FFF6EF; --paper:#FFFDFA;
    --ink:#5A4038; --ink-soft:#9A857C; --line:#F0E1D6; --hangang:#CFE4E8;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;}
  body{background:#EDE3DC;display:flex;flex-direction:column;align-items:center;gap:10px;padding:28px 0 48px;min-height:100vh;}
  .label{font-size:12px;color:#8B7A70;letter-spacing:.3px;}
  .phone{width:390px;height:844px;background:var(--paper);border-radius:44px;overflow:hidden;position:relative;box-shadow:0 22px 60px rgba(90,64,56,.22);}

  /* status bar */
  .statusbar{position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;z-index:40;font-size:15px;font-weight:600;color:var(--ink);}
  .sb-right{display:flex;align-items:center;gap:6px;}
  .sb-bat{width:22px;height:11px;border:1.5px solid var(--ink);border-radius:3px;position:relative;}
  .sb-bat::after{content:"";position:absolute;top:2px;left:2px;bottom:2px;width:13px;background:var(--ink);border-radius:1px;}
  .sb-bat::before{content:"";position:absolute;right:-3px;top:3px;height:4px;width:2px;background:var(--ink);border-radius:1px;}
  .sb-sig{display:flex;gap:2px;align-items:flex-end;}
  .sb-sig i{width:3px;background:var(--ink);border-radius:1px;}
  .sb-sig i:nth-child(1){height:5px}.sb-sig i:nth-child(2){height:8px}.sb-sig i:nth-child(3){height:11px}.sb-sig i:nth-child(4){height:14px}

  /* header overlay */
  .header{position:absolute;top:54px;left:0;right:0;z-index:30;padding:8px 18px 14px;}
  .htitle{display:flex;align-items:baseline;gap:8px;}
  .htitle h1{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-.3px;}
  .htitle .cnt{font-size:20px;font-weight:800;color:var(--coral-deep);}
  .hsub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .searchbar{margin-top:12px;height:44px;background:rgba(255,253,250,.92);border:1px solid var(--line);border-radius:22px;display:flex;align-items:center;padding:0 16px;gap:10px;box-shadow:0 6px 18px rgba(90,64,56,.08);backdrop-filter:blur(6px);}
  .searchbar .mag{width:15px;height:15px;border:2px solid var(--ink-soft);border-radius:50%;position:relative;flex:none;}
  .searchbar .mag::after{content:"";position:absolute;width:6px;height:2px;background:var(--ink-soft);right:-4px;bottom:-1px;transform:rotate(45deg);border-radius:1px;}
  .searchbar span{font-size:14px;color:var(--ink-soft);}
  .chips{margin-top:10px;display:flex;gap:8px;overflow:hidden;}
  .chip{height:32px;padding:0 14px;border-radius:16px;background:rgba(255,253,250,.92);border:1px solid var(--line);display:flex;align-items:center;font-size:12.5px;color:var(--ink);white-space:nowrap;box-shadow:0 4px 12px rgba(90,64,56,.06);backdrop-filter:blur(6px);}
  .chip.on{background:var(--coral);border-color:var(--coral);color:#fff;font-weight:600;}

  /* map */
  .map{position:absolute;inset:0;background:
      radial-gradient(120% 80% at 30% 10%, #FFFBF6 0%, #FBEFE6 60%, #F6E6DA 100%);}
  .roads i{position:absolute;background:#F3E3D6;border-radius:6px;}
  .roads i.h{height:7px}.roads i.v{width:7px}
  .roads i.thin{background:#F6E9DE;}
  /* han river */
  .river{position:absolute;left:-40px;right:-40px;top:430px;height:120px;
    background:linear-gradient(180deg,#DCECEF,#C6DFE4);border-radius:60% 40% 55% 45%/70% 60% 40% 30%;
    transform:rotate(-6deg);opacity:.9;}
  .river::after{content:"";position:absolute;inset:14px;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.35),transparent);}
  .green{position:absolute;border-radius:50%;background:radial-gradient(circle,#DCEBCF,#CFE2BF);opacity:.8;}

  /* pins */
  .pin{position:absolute;transform:translate(-50%,-100%);z-index:10;cursor:pointer;}
  .pin .drop{width:34px;height:34px;background:var(--coral);border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 6px 14px rgba(245,116,79,.45);display:flex;align-items:center;justify-content:center;border:2.5px solid #fff;}
  .pin .heart{transform:rotate(45deg);width:12px;height:12px;position:relative;}
  .pin .heart::before,.pin .heart::after{content:"";position:absolute;width:7px;height:11px;background:#fff;border-radius:6px 6px 0 0;top:0;left:2.5px;transform:rotate(-45deg);transform-origin:0 100%;}
  .pin .heart::after{left:2.5px;transform:rotate(45deg);transform-origin:100% 100%;}
  .pin .badge{position:absolute;top:-6px;right:-6px;min-width:19px;height:19px;background:var(--ink);color:#fff;border-radius:10px;border:2px solid #fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;z-index:2;}
  .pin .lab{position:absolute;top:38px;left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(255,253,250,.94);border:1px solid var(--line);border-radius:10px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--ink);box-shadow:0 4px 10px rgba(90,64,56,.1);}
  .pin.sm .drop{width:26px;height:26px;border-width:2px;}
  .pin.sm .heart{width:9px;height:9px;}
  .pin.sm .heart::before,.pin.sm .heart::after{width:5px;height:8px;left:2px;}

  /* recenter + toggle */
  .fab{position:absolute;right:18px;bottom:190px;width:46px;height:46px;border-radius:23px;background:var(--paper);border:1px solid var(--line);box-shadow:0 8px 20px rgba(90,64,56,.16);display:flex;align-items:center;justify-content:center;z-index:25;}
  .fab .loc{width:18px;height:18px;border:2px solid var(--coral-deep);border-radius:50%;position:relative;}
  .fab .loc::after{content:"";position:absolute;inset:4px;background:var(--coral-deep);border-radius:50%;}
  .toggle{position:absolute;left:50%;transform:translateX(-50%);bottom:112px;z-index:25;height:42px;background:var(--paper);border:1px solid var(--line);border-radius:21px;display:flex;padding:4px;box-shadow:0 8px 22px rgba(90,64,56,.16);}
  .toggle button{border:none;background:none;font-size:13px;font-weight:700;color:var(--ink-soft);padding:0 20px;border-radius:17px;display:flex;align-items:center;gap:6px;}
  .toggle button.on{background:var(--coral);color:#fff;}

  /* tab bar */
  .tabbar{position:absolute;bottom:0;left:0;right:0;height:84px;background:rgba(255,253,250,.96);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:10px 6px 0;z-index:35;backdrop-filter:blur(10px);}
  .tab{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10.5px;color:var(--ink-soft);width:60px;}
  .tab.on{color:var(--coral-deep);font-weight:700;}
  .ic{width:24px;height:24px;position:relative;}
  .ic-cal{border:2px solid currentColor;border-radius:5px;}
  .ic-cal::before{content:"";position:absolute;top:-1px;left:4px;right:4px;height:4px;border-top:2px solid currentColor;}
  .ic-cal::after{content:"";position:absolute;top:8px;left:3px;right:3px;bottom:4px;border-top:2px solid currentColor;}
  .ic-alb{border:2px solid currentColor;border-radius:5px;overflow:hidden;}
  .ic-alb::before{content:"";position:absolute;left:3px;bottom:3px;width:7px;height:7px;background:currentColor;border-radius:50%;}
  .ic-alb::after{content:"";position:absolute;right:-1px;bottom:2px;border-left:9px solid transparent;border-right:6px solid transparent;border-bottom:11px solid currentColor;}
  .ic-log{border:2px solid currentColor;border-radius:5px;}
  .ic-log::before{content:"";position:absolute;left:5px;top:6px;right:5px;height:2px;background:currentColor;box-shadow:0 5px 0 currentColor,0 10px 0 currentColor;}
  .ic-map{width:0;height:0;}
  .ic-map .p{width:20px;height:20px;background:currentColor;border-radius:50% 50% 50% 0;transform:rotate(-45deg);position:absolute;left:2px;top:0;}
  .ic-map .p::after{content:"";position:absolute;inset:6px;background:var(--paper);border-radius:50%;transform:rotate(45deg);}
  .ic-set{border:2px solid currentColor;border-radius:50%;}
  .ic-set::after{content:"";position:absolute;inset:6px;border:2px solid currentColor;border-radius:50%;}
</style>
</head>
<body>
  <div class="label">love today · 지도 A안(핀맵) · 01 지도 메인</div>
  <div class="phone">
    <!-- status bar -->
    <div class="statusbar">
      <span>9:41</span>
      <div class="sb-right">
        <div class="sb-sig"><i></i><i></i><i></i><i></i></div>
        <span style="font-size:12px">5G</span>
        <div class="sb-bat"></div>
      </div>
    </div>

    <!-- map layer -->
    <div class="map">
      <div class="roads">
        <i class="h" style="top:210px;left:-20px;right:-20px"></i>
        <i class="h thin" style="top:330px;left:20px;right:-40px"></i>
        <i class="h" style="top:620px;left:-20px;right:40px"></i>
        <i class="v" style="left:90px;top:120px;bottom:80px"></i>
        <i class="v thin" style="left:230px;top:80px;bottom:120px"></i>
        <i class="v" style="left:320px;top:150px;bottom:40px"></i>
      </div>
      <div class="green" style="width:120px;height:100px;left:-30px;top:250px"></div>
      <div class="green" style="width:90px;height:80px;right:-20px;top:600px"></div>
      <div class="river"></div>
    </div>

    <!-- pins -->
    <div class="pin" style="left:120px;top:300px">
      <div class="drop"><span class="heart"></span></div>
      <span class="badge">4</span>
      <span class="lab">성수 어니언</span>
    </div>
    <div class="pin" style="left:260px;top:260px">
      <div class="drop"><span class="heart"></span></div>
      <span class="badge">2</span>
      <span class="lab">서울숲</span>
    </div>
    <div class="pin sm" style="left:180px;top:400px">
      <div class="drop"><span class="heart"></span></div>
    </div>
    <div class="pin sm" style="left:300px;top:380px">
      <div class="drop"><span class="heart"></span></div>
    </div>
    <div class="pin" style="left:100px;top:560px">
      <div class="drop"><span class="heart"></span></div>
      <span class="badge">3</span>
      <span class="lab">한남 소전</span>
    </div>
    <div class="pin sm" style="left:250px;top:600px">
      <div class="drop"><span class="heart"></span></div>
    </div>
    <div class="pin sm" style="left:330px;top:660px">
      <div class="drop"><span class="heart"></span></div>
    </div>

    <!-- header -->
    <div class="header">
      <div class="htitle"><h1>우리가 함께 간 곳</h1><span class="cnt">23곳</span></div>
      <div class="hsub">승환 · 수정의 데이트 지도</div>
      <div class="searchbar"><span class="mag"></span><span>장소·동네로 찾기</span></div>
      <div class="chips">
        <div class="chip on">전체</div>
        <div class="chip">카페</div>
        <div class="chip">맛집</div>
        <div class="chip">산책</div>
        <div class="chip">별점순</div>
      </div>
    </div>

    <!-- controls -->
    <div class="fab"><span class="loc"></span></div>
    <div class="toggle">
      <button class="on"><span style="width:12px;height:12px;background:currentColor;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:inline-block"></span>지도</button>
      <button>리스트</button>
    </div>

    <!-- tab bar -->
    <div class="tabbar">
      <div class="tab"><span class="ic ic-cal"></span>달력</div>
      <div class="tab"><span class="ic ic-alb"></span>앨범</div>
      <div class="tab"><span class="ic ic-log"></span>기록</div>
      <div class="tab on"><span class="ic ic-map"><span class="p"></span></span>지도</div>
      <div class="tab"><span class="ic ic-set"></span>설정</div>
    </div>
  </div>
</body>
</html>
