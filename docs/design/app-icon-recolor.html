<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  body{margin:0;background:#EEE;font-family:-apple-system,"Apple SD Gothic Neo",sans-serif;}
  .wrap{width:300px;margin:0 auto;padding:20px;}
  .cap{font-size:13px;font-weight:800;color:#333;margin:20px 4px 9px;}
  .tile{width:220px;height:220px;border-radius:50px;box-shadow:0 4px 14px rgba(0,0,0,.14);
        margin:0 auto;overflow:hidden;}
  svg{display:block;width:100%;height:100%;}
</style></head>
<body>
<div class="wrap" id="root"></div>
<script>
// 현재 아이콘 구성(펼친 책 + 하트) 유지, 배경/내부 색만 변주.
const BOOK_L = "M50 31 C 40 25, 26 24, 17 28 L 17 69 C 26 65, 40 66, 50 73 Z";
const BOOK_R = "M50 31 C 60 25, 74 24, 83 28 L 83 69 C 74 65, 60 66, 50 73 Z";
const HEART  = "M50 65 C 39 56, 32 50, 32 43 C 32 38, 36 35, 40 35 C 44 35, 47 38, 50 41 C 53 38, 56 35, 60 35 C 64 35, 68 38, 68 43 C 68 50, 61 56, 50 65 Z";

function icon(id, bg1, bg2, book, spine, h1, h2){
  return `
  <svg viewBox="0 0 100 100">
    <defs>
      <linearGradient id="bg${id}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="${bg1}"/><stop offset="1" stop-color="${bg2}"/>
      </linearGradient>
      <linearGradient id="ht${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${h1}"/><stop offset="1" stop-color="${h2}"/>
      </linearGradient>
      <filter id="sh${id}" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="1.2" stdDeviation="1.4" flood-color="#000" flood-opacity="0.18"/>
      </filter>
    </defs>
    <rect width="100" height="100" fill="url(#bg${id})"/>
    <g filter="url(#sh${id})">
      <path d="${BOOK_L}" fill="${book}"/>
      <path d="${BOOK_R}" fill="${book}"/>
      <rect x="48.7" y="31" width="2.6" height="42" fill="${spine}"/>
    </g>
    <path d="${HEART}" fill="url(#ht${id})"/>
  </svg>`;
}

const items = [
  ["1 · 라벤더 배경 + 흰 책 · 보라 하트",  "#B9A8FF","#8E7BF5","#FFFFFF","#ECE7FF","#A78BFF","#7A5CE0"],
  ["2 · 민트 배경 + 흰 책 · 틸 하트",      "#86DCC6","#46B597","#FFFFFF","#E3FBF3","#33C6A4","#178E76"],
  ["3 · 네이비 배경 + 흰 책 · 핑크 하트",  "#3E4E82","#212C50","#FFFFFF","#E9ECFF","#FF9BB6","#FF5C8A"],
  ["4 · 크림 배경 + 코럴 책·하트 (라이트)","#FFF3E9","#FBE3D2","#FF8E72","#FFD9C8","#FF7A9C","#FF5C8A"],
  ["5 · 피치 배경 + 흰 책 · 레드 하트",    "#FFC79E","#FF9E7D","#FFFFFF","#FFE7D6","#FF6B6B","#E23E5B"],
  ["6 · 로즈 배경 + 흰 책 · 마젠타 하트",  "#F7A6C2","#E8619A","#FFFFFF","#FFE4EE","#FF6FA5","#D6408A"],
];
const root = document.getElementById('root');
items.forEach((it, i) => {
  const [cap, ...c] = it;
  const d = document.createElement('div');
  d.innerHTML = `<div class="cap">${cap}</div><div class="tile">${icon(i, ...c)}</div>`;
  root.appendChild(d.children[0]); root.appendChild(d.children[0]);
});
</script>
</body></html>
