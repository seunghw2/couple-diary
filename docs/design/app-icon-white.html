<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  body{margin:0;background:#EEE;font-family:-apple-system,"Apple SD Gothic Neo",sans-serif;}
  .wrap{width:320px;margin:0 auto;padding:20px;}
  .cap{font-size:14px;font-weight:800;color:#333;margin:22px 4px 10px;}
  .tile{width:220px;height:220px;border-radius:50px;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.12);
        display:flex;align-items:center;justify-content:center;margin:0 auto;overflow:hidden;}
  svg{display:block;}
</style></head>
<body>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF9E7D"/><stop offset="1" stop-color="#FF6B9D"/>
    </linearGradient>
    <linearGradient id="coral2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF8E72"/><stop offset="1" stop-color="#FF5C8A"/>
    </linearGradient>
  </defs>
</svg>
<div class="wrap">

  <!-- A. 라인 책 + 그라데이션 하트 -->
  <div class="cap">A · 라인 책 + 하트 (현재 톤, 흰 배경)</div>
  <div class="tile">
    <svg width="150" height="150" viewBox="0 0 100 100">
      <g fill="none" stroke="#FF8E72" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round">
        <path d="M50 42 C 40 36, 24 34, 15 38 L 15 78 C 24 74, 40 76, 50 82 Z"/>
        <path d="M50 42 C 60 36, 76 34, 85 38 L 85 78 C 76 74, 60 76, 50 82 Z"/>
        <line x1="50" y1="42" x2="50" y2="82"/>
      </g>
      <path d="M50 40 C 44 30, 30 30, 30 42 C 30 52, 42 58, 50 66 C 58 58, 70 52, 70 42 C 70 30, 56 30, 50 40 Z"
            fill="url(#coral)"/>
    </svg>
  </div>

  <!-- B. 채움형 (코럴 책 + 진한 하트) -->
  <div class="cap">B · 채움형 (또렷·볼드)</div>
  <div class="tile">
    <svg width="150" height="150" viewBox="0 0 100 100">
      <path d="M50 44 C 40 38, 24 36, 15 40 L 15 80 C 24 76, 40 78, 50 84 Z" fill="#FFB59C"/>
      <path d="M50 44 C 60 38, 76 36, 85 40 L 85 80 C 76 76, 60 78, 50 84 Z" fill="#FF8E72"/>
      <line x1="50" y1="44" x2="50" y2="84" stroke="#fff" stroke-width="3"/>
      <path d="M50 38 C 43 27, 27 27, 27 40 C 27 51, 41 58, 50 68 C 59 58, 73 51, 73 40 C 73 27, 57 27, 50 38 Z"
            fill="url(#coral2)"/>
    </svg>
  </div>

  <!-- C. 하트 도미넌트 -->
  <div class="cap">C · 하트 중심 (책은 작게)</div>
  <div class="tile">
    <svg width="150" height="150" viewBox="0 0 100 100">
      <path d="M50 78 C 20 56, 10 38, 24 26 C 34 18, 48 22, 50 34 C 52 22, 66 18, 76 26 C 90 38, 80 56, 50 78 Z"
            fill="url(#coral)"/>
      <g fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M50 48 C 44 44, 36 43, 31 45 L 31 60 C 36 58, 44 59, 50 62 Z"/>
        <path d="M50 48 C 56 44, 64 43, 69 45 L 69 60 C 64 58, 56 59, 50 62 Z"/>
      </g>
    </svg>
  </div>

  <!-- D. 하트 북마크 -->
  <div class="cap">D · 책 + 하트 북마크(리본)</div>
  <div class="tile">
    <svg width="150" height="150" viewBox="0 0 100 100">
      <path d="M50 34 C 40 28, 24 26, 15 30 L 15 76 C 24 72, 40 74, 50 80 Z" fill="#FFC7B0"/>
      <path d="M50 34 C 60 28, 76 26, 85 30 L 85 76 C 76 72, 60 74, 50 80 Z" fill="#FFD9C8"/>
      <line x1="50" y1="34" x2="50" y2="80" stroke="#fff" stroke-width="3"/>
      <path d="M63 28 L 63 58 L 70 51 L 77 58 L 77 28 Z" fill="url(#coral2)"/>
    </svg>
  </div>

  <!-- E. 미니멀 하트북 (듀오톤 글리프) -->
  <div class="cap">E · 미니멀 하트북 (듀오톤)</div>
  <div class="tile">
    <svg width="150" height="150" viewBox="0 0 100 100">
      <path d="M50 82 C 18 58, 8 40, 22 27 C 33 18, 48 23, 50 36 C 52 23, 67 18, 78 27 C 92 40, 82 58, 50 82 Z"
            fill="#FFE4DC"/>
      <g fill="none" stroke="url(#coral2)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
        <path d="M50 44 C 43 39, 33 38, 27 40 L 27 60 C 33 58, 43 59, 50 63 Z"/>
        <path d="M50 44 C 57 39, 67 38, 73 40 L 73 60 C 67 58, 57 59, 50 63 Z"/>
        <line x1="50" y1="44" x2="50" y2="63"/>
      </g>
    </svg>
  </div>

</div>
</body></html>
